const yes=()=>{if(ans)return;const q=dk[ix];setSc(s=>s+q.pts);setRes(p=>[...p,{c:true}]);addH({player:pl,cat:q.cat,pts:q.pts,correct:true,mode:"train"});setAns(true)};
const no=()=>{if(ans)return;addH({player:pl,cat:dk[ix].cat,pts:0,correct:false,mode:"train"});setRes(p=>[...p,{c:false}]);setAns(true)};
const nx=()=>{if(!ans){addH({player:pl,cat:dk[ix].cat,pts:0,correct:false,mode:"train"});setRes(p=>[...p,{c:false}]);}if(ix+1>=dk.length){setPh("done");return;}setIx(i=>i+1);setSa(false);setAns(false);setTm(15);setTa(true)};

if(ph==="setup")return html`<div class="fu">

${CATS.map(c=>html`<button onClick=${()=>setCats(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c])} style=${{padding:"5px 10px",borderRadius:12,fontSize:10,fontWeight:600,background:cats.includes(c)?CC[c]+"20":"#0f1629",color:cats.includes(c)?CC[c]:"#64748b",border:"1px solid "+(cats.includes(c)?CC[c]+"44":"#1e293b")}}>${c} (${qs.filter(q=>q.cat===c).length})</button>`)}</div>
<button onClick=${go} disabled=${!pl} style=${{background:pl?"#eab308":"#1e293b",color:pl?"#060a12":"#64748b",padding:"12px 32px",borderRadius:8,fontSize:14,fontWeight:700}}>${pl?"Start as "+pl:"Select name"}</button>
</div>`}</div>`;

if(ph==="done"){const c=res.filter(r=>r.c).length,t=res.length,p=t?Math.round(c/t*100):0;
return html`<div class="fu" style=${{textAlign:"center",maxWidth:440,margin:"0 auto"}}>
<div style=${{fontSize:52}}>${p>=80?"🔥":p>=50?"💪":"📚"}</div>
<h2 class="m" style=${{fontSize:20,fontWeight:800,color:"#eab308"}}>Done!</h2><p>${pl}</p>
<div style=${{display:"flex",justifyContent:"center",gap:20,margin:"12px 0 20px"}}>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#eab308"}}>${sc}</div><div style=${{fontSize:10,color:"#64748b"}}>pts</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#10b981"}}>${c}/${t}</div><div style=${{fontSize:10,color:"#64748b"}}>correct</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:p>=80?"#10b981":p>=50?"#eab308":"#ef4444"}}>${p}%</div><div style=${{fontSize:10,color:"#64748b"}}>acc</div></div>
</div>
<button onClick=${()=>setPh("setup")} style=${{background:"#eab308",color:"#060a12",padding:"11px 28px",borderRadius:8,fontWeight:700}}>Again</button>
</div>`;}

const cur=dk[ix];
return html`<div class="fu">
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:8}}>
<span class="m" style=${{fontSize:12,color:"#64748b"}}>Q ${ix+1}/${dk.length} · ${pl}</span>
<span class="m" style=${{fontSize:14,fontWeight:700,color:"#eab308"}}>${sc} pts</span></div>
<div style=${{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
<div style=${{flex:1,height:3,background:"#1e293b",borderRadius:2}}><div style=${{width:(tm/15*100)+"%",height:"100%",background:tm<=5?"#ef4444":"#eab308",borderRadius:2,transition:"width 1s linear"}}/></div>
<span class="m" style=${{fontSize:16,fontWeight:700,color:tm<=5?"#ef4444":"#eab308"}}>${tm}s</span></div>
<div style=${{background:"#0f1629",borderRadius:14,padding:24,border:"1px solid #1e293b",marginBottom:16}}>
<div style=${{display:"flex",gap:6,marginBottom:14}}>
<span style=${{background:CC[cur.cat]+"20",color:CC[cur.cat],padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700}}>${cur.cat}</span>
<span style=${{background:"#eab30820",color:"#eab308",padding:"3px 8px",borderRadius:16,fontSize:11,fontWeight:700}}>${cur.pts} pts</span></div>
<p style=${{fontSize:17,lineHeight:1.55,fontWeight:500,marginBottom:16}}>${cur.q}</p>
${cur.type==="mc"&&cur.options&&!sa&&html`<div style=${{display:"grid",gap:6,marginBottom:14}}>
${cur.options.map((o,i)=>html`<div style=${{padding:"10px 14px",borderRadius:8,fontSize:13,background:"#1e293b",border:"1px solid #2d3a50",color:"#cbd5e1"}}>${["A","B","C","D"][i]}. ${o}</div>`)}</div>`}
${!sa&&html`<button onClick=${buzz} style=${{background:"linear-gradient(135deg,#ef4444,#b91c1c)",color:"white",padding:"14px 36px",borderRadius:12,fontSize:17,fontWeight:800,display:"block",margin:"0 auto"}}>🔔 REVEAL</button>`}
${sa&&html`<div class="fr" style=${{background:"#10b98118",border:"2px solid #10b981",borderRadius:10,padding:16}}>
<p class="m" style=${{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:6}}>ANSWER</p>
<p style=${{fontSize:20,fontWeight:800,color:"#fff"}}>${ansText(cur)}</p></div>`}
</div>
${sa&&!ans&&html`<div class="fu" style=${{marginBottom:14}}>
<p class="m" style=${{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>DID YOU KNOW IT?</p>
<div style=${{display:"flex",gap:10}}>
<button onClick=${no} style=${{flex:1,padding:13,borderRadius:10,fontSize:15,fontWeight:700,background:"#ef444418",color:"#ef4444",border:"1px solid #ef444433"}}>✗ Nope</button>
<button onClick=${yes} style=${{flex:1,padding:13,borderRadius:10,fontSize:15,fontWeight:700,background:"#10b98118",color:"#10b981",border:"1px solid #10b98133"}}>✓ Got It!</button>
</div></div>`}
${ans&&html`<button onClick=${nx} style=${{width:"100%",background:"#eab308",color:"#060a12",padding:12,borderRadius:8,fontWeight:700}}>${ix+1>=dk.length?"Results":"Next →"}</button>`}
${sa&&!ans&&html`<button onClick=${nx} style=${{width:"100%",marginTop:8,background:"#1e293b",color:"#64748b",padding:10,borderRadius:8,fontSize:12,border:"1px solid #2d3a50"}}>Skip</button>`}
</div>`;
}

// ═══ FLASHCARDS ═══
function Flash({qs,prog,setProg}){
const[cat,setCat]=useState("All");
const[dk,setDk]=useState([]);const[ix,setIx]=useState(0);
const[flip,setFlip]=useState(false);const[on,setOn]=useState(false);
const go=()=>{let p=cat==="All"?[...qs]:qs.filter(q=>q.cat===cat);
p=p.map(q=>{const r=prog[q.id]||{r:0,w:0};return{...q,wt:Math.max(.1,1+r.w*2-r.r*.5)}}).sort((a,b)=>b.wt-a.wt).slice(0,30);
for(let i=p.length-1;i>0;i--){const j=0|Math.random()*(i+1);if(Math.random()<.3)[p[i],p[j]]=[p[j],p[i]];}
if(p.length){setDk(p);setIx(0);setFlip(false);setOn(true);}};
const mark=(ok)=>{const q=dk[ix];setProg(p=>({...p,[q.id]:{r:(p[q.id]?.r||0)+(ok?1:0),w:(p[q.id]?.w||0)+(ok?0:1)}}));
if(ix+1>=dk.length){setOn(false);return;}setIx(i=>i+1);setFlip(false)};

if(!on)return html`<div class="fu">
<h2 class="m" style=${{fontSize:18,fontWeight:800,marginBottom:6}}>🃏 Flashcard Drill</h2>
<p style=${{fontSize:13,color:"#64748b",marginBottom:16}}>${qs.length?"Missed questions come back more often.":"Questions coming soon!"}</p>
${qs.length>0&&html`<div>
<div style=${{display:"flex",flexWrap:"wrap",gap:5,marginBottom:16}}>
<button onClick=${()=>setCat("All")} style=${{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:cat==="All"?"#eab30820":"#0f1629",color:cat==="All"?"#eab308":"#64748b",border:"1px solid "+(cat==="All"?"#eab30844":"#1e293b")}}>All (${qs.length})</button>
${CATS.map(c=>{const n=qs.filter(q=>q.cat===c).length;return n?html`<button onClick=${()=>setCat(c)} style=${{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:cat===c?CC[c]+"20":"#0f1629",color:cat===c?CC[c]:"#64748b",border:"1px solid "+(cat===c?CC[c]+"44":"#1e293b")}}>${c} (${n})</button>`:null})}</div>
<button onClick=${go} style=${{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"white",padding:"12px 32px",borderRadius:8,fontWeight:700}}>Start Drill</button>
</div>`}</div>`;

const cur=dk[ix];
return html`<div class="fu" style=${{maxWidth:540,margin:"0 auto"}}>
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:12}}>
<span class="m" style=${{fontSize:12,color:"#64748b"}}>${ix+1}/${dk.length}</span>
<button onClick=${()=>setOn(false)} style=${{fontSize:11,color:"#64748b",background:"none",textDecoration:"underline"}}>End</button></div>
<div onClick=${()=>!flip&&setFlip(true)} style=${{background:flip?"#1a1040":"#0f1629",border:"2px solid "+(flip?"#a78bfa":"#1e293b"),borderRadius:16,padding:36,minHeight:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:flip?"default":"pointer",textAlign:"center",transition:"all .3s"}}>
<span style=${{fontSize:10,fontWeight:700,color:CC[cur.cat],marginBottom:12}}>${cur.cat} · ${cur.pts} pts</span>
${!flip?html`<div>
<p style=${{fontSize:17,lineHeight:1.5,fontWeight:500,marginBottom:14}}>${cur.q}</p>
${cur.type==="mc"&&cur.options&&html`<div style=${{fontSize:12,color:"#64748b",textAlign:"left",width:"100%"}}>${cur.options.map((o,i)=>html`<div style=${{marginBottom:3}}>${["A","B","C","D"][i]}. ${o}</div>`)}</div>`}
<p style=${{fontSize:11,color:"#475569",marginTop:12}}>Tap to reveal</p>
</div>`:html`<div class="fr">
<p class="m" style=${{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:10}}>ANSWER</p>
<p style=${{fontSize:24,fontWeight:800,color:"#fff"}}>${ansText(cur)}</p></div>`}
</div>
${flip&&html`<div class="fu" style=${{display:"flex",gap:10,marginTop:16}}>
<button onClick=${()=>mark(false)} style=${{flex:1,padding:12,borderRadius:10,fontSize:15,fontWeight:700,background:"#ef444418",color:"#ef4444",border:"1px solid #ef444433"}}>✗ Missed</button>
<button onClick=${()=>mark(true)} style=${{flex:1,padding:12,borderRadius:10,fontSize:15,fontWeight:700,background:"#10b98118",color:"#10b981",border:"1px solid #10b98133"}}>✓ Got It</button>
</div>`}
</div>`;
}

// ═══ ASSESSMENT ═══
function Assess({qs,players,addH,named}){
const[ph,setPh]=useState("sel");
const[pl,setPl]=useState("");
const[dk,setDk]=useState([]);const[ix,setIx]=useState(0);
const[answers,setAnswers]=useState([]);
const[typed,setTyped]=useState("");const[mc,setMc]=useState(null);
const[tm,setTm]=useState(15);const ref=useRef();
const go=(list)=>{if(!pl||!list.length)return;setDk([...list].sort(()=>Math.random()-.5));setIx(0);setAnswers([]);setTyped("");setMc(null);setTm(15);setPh("play")};
useEffect(()=>{if(ph==="play"&&tm>0)ref.current=setTimeout(()=>setTm(t=>t-1),1e3);else if(ph==="play"&&tm===0)submit();return()=>clearTimeout(ref.current)},[tm,ph,ix]);
const submit=()=>{const q=dk[ix];let ua="",ok=false;
if(q.type==="mc"&&q.options){ua=mc||"—";ok=mc===q.a}else{ua=typed.trim()||"—";const cl=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim(),uc=cl(ua),ac=cl(q.a);ok=uc===ac||ac.includes(uc)||uc.includes(ac);if(!ok)ok=ac.split(" ").filter(w=>w.length>3).some(w=>uc.includes(w))}
setAnswers(p=>[...p,{i:ix,ua,ok,pts:q.pts,cat:q.cat}]);addH({player:pl,cat:q.cat,pts:ok?q.pts:0,correct:ok,mode:"assess"});
if(ix+1>=dk.length)setPh("done");else{setIx(i=>i+1);setTyped("");setMc(null);setTm(15)}};

<label class="m" style=${{fontSize:12,fontWeight:700,color:"#eab308",display:"block",marginBottom:6}}>WHO ARE YOU?</label>

${named.length>0&&html`<div style=${{marginBottom:20}}>
<label class="m" style=${{fontSize:12,fontWeight:700,color:"#ef4444",display:"block",marginBottom:8}}>ASSIGNED</label>
${named.map((a,i)=>html`<button key=${i} onClick=${()=>pl&&go(a.questions)} disabled=${!pl} style=${{width:"100%",background:"#0f1629",border:"1px solid #ef444433",borderRadius:10,padding:"14px 16px",textAlign:"left",color:"#e2e8f0",opacity:pl?1:.5,marginBottom:8}}>
<div style=${{fontSize:15,fontWeight:700}}>${a.name}</div>
<div style=${{fontSize:11,color:"#64748b"}}>${a.questions.length} questions</div></button>`)}</div>`}
${qs.length>0&&html`<button onClick=${()=>pl&&go(qs)} disabled=${!pl} style=${{background:pl?"#1e293b":"#0f1629",color:pl?"#e2e8f0":"#475569",padding:"10px 20px",borderRadius:8,border:"1px solid #2d3a50"}}>Random Practice (${qs.length} Qs)</button>`}
</div>`;

if(ph==="done"){const c=answers.filter(a=>a.ok).length,t=answers.length,p=t?Math.round(c/t*100):0,pts=answers.filter(a=>a.ok).reduce((s,a)=>s+a.pts,0);
const byCat={};answers.forEach(a=>{if(!byCat[a.cat])byCat[a.cat]={c:0,t:0};byCat[a.cat].t++;if(a.ok)byCat[a.cat].c++});
return html`<div class="fu" style=${{maxWidth:500,margin:"0 auto"}}>
<div style=${{textAlign:"center",marginBottom:20}}>
<div style=${{fontSize:52}}>${p>=80?"🔥":p>=60?"💪":"📚"}</div>
<h2 class="m" style=${{fontSize:20,fontWeight:800,color:"#eab308"}}>Done!</h2><p>${pl}</p>
<div style=${{display:"flex",justifyContent:"center",gap:20,margin:"12px 0"}}>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#eab308"}}>${pts}</div><div style=${{fontSize:10,color:"#64748b"}}>pts</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#10b981"}}>${c}/${t}</div><div style=${{fontSize:10,color:"#64748b"}}>correct</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:p>=80?"#10b981":p>=50?"#eab308":"#ef4444"}}>${p}%</div><div style=${{fontSize:10,color:"#64748b"}}>acc</div></div></div></div>
<h3 class="m" style=${{fontSize:13,fontWeight:700,color:"#94a3b8",marginBottom:8}}>BY CATEGORY</h3>
${Object.entries(byCat).map(([cat,s])=>{const cp=Math.round(s.c/s.t*100);return html`<div style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1e293b"}}>

<div style=${{flex:1,height:6,background:"#1e293b",borderRadius:3}}><div style=${{width:cp+"%",height:"100%",background:cp>=80?"#10b981":cp>=50?"#eab308":"#ef4444",borderRadius:3}}/></div>
<span class="m" style=${{fontSize:12,fontWeight:700,color:cp>=80?"#10b981":cp>=50?"#eab308":"#ef4444"}}>${cp}%</span></div>`})}
<h3 class="m" style=${{fontSize:13,fontWeight:700,color:"#94a3b8",margin:"16px 0 8px"}}>REVIEW</h3>

<p style=${{fontSize:13,margin:"4px 0"}}>${q.q}</p>
${!a.ok&&html`<p style=${{fontSize:12,color:"#ef4444"}}>You: ${a.ua}</p>`}
<p style=${{fontSize:12,color:"#10b981",fontWeight:600}}>Answer: ${ansText(q)}</p></div>`})}
<button onClick=${()=>setPh("sel")} style=${{marginTop:16,width:"100%",background:"#eab308",color:"#060a12",padding:12,borderRadius:8,fontWeight:700}}>Done</button>
</div>`}

const cur=dk[ix];
return html`<div class="fu">
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:8}}>
<span class="m" style=${{fontSize:12,color:"#64748b"}}>Q ${ix+1}/${dk.length}</span>
<span class="m" style=${{fontSize:12,fontWeight:700,color:"#10b981"}}>${answers.filter(a=>a.ok).length} correct</span></div>
<div style=${{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
<div style=${{flex:1,height:5,background:"#1e293b",borderRadius:3}}><div style=${{width:(tm/15*100)+"%",height:"100%",background:tm<=5?"#ef4444":tm<=10?"#eab308":"#10b981",borderRadius:3,transition:"width 1s linear"}}/></div>
<span class="m" style=${{fontSize:20,fontWeight:800,color:tm<=5?"#ef4444":"#eab308"}}>${tm}s</span></div>
<div style=${{background:"#0f1629",borderRadius:14,padding:24,border:"1px solid "+(tm<=5?"#ef444444":"#1e293b"),marginBottom:16}}>
<div style=${{display:"flex",gap:6,marginBottom:12}}>
<span style=${{background:CC[cur.cat]+"20",color:CC[cur.cat],padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700}}>${cur.cat}</span>
<span style=${{background:"#eab30820",color:"#eab308",padding:"3px 8px",borderRadius:16,fontSize:11,fontWeight:700}}>${cur.pts} pts</span></div>
<p style=${{fontSize:18,lineHeight:1.55,fontWeight:600,marginBottom:16}}>${cur.q}</p>
${cur.type==="mc"&&cur.options?html`<div style=${{display:"grid",gap:6}}>
${cur.options.map((o,i)=>{const l=["A","B","C","D"][i];return html`<button onClick=${()=>setMc(l)} style=${{padding:"12px 14px",borderRadius:8,fontSize:14,textAlign:"left",background:mc===l?"#eab30822":"#1e293b",border:"2px solid "+(mc===l?"#eab308":"#2d3a50"),color:mc===l?"#eab308":"#cbd5e1",fontWeight:mc===l?700:400}}>${l}. ${o}</button>`})}</div>`
:html`<input value=${typed} onInput=${e=>setTyped(e.target.value)} onKeyDown=${e=>e.key==="Enter"&&typed.trim()&&submit()} placeholder="Type answer..." class="inp" style=${{fontSize:16}}/>`}
</div>
<button onClick=${submit} disabled=${cur.type==="mc"?!mc:!typed.trim()} style=${{width:"100%",padding:14,borderRadius:10,fontSize:15,fontWeight:800,background:(cur.type==="mc"?mc:typed.trim())?"#eab308":"#1e293b",color:(cur.type==="mc"?mc:typed.trim())?"#060a12":"#64748b"}}>SUBMIT →</button>
</div>`;
}

// ═══ BUILDER (coach) ═══
function Build({addT,tQs,setT,aQs,setA,addAQ,named,setN}){
const[bk,setBk]=useState("training");
const[fm,setFm]=useState({cat:CATS[0],pts:10,type:"buzzer",q:"",a:"",options:["","","",""]});
const curQs=bk==="assessment"?aQs:tQs,curSet=bk==="assessment"?setA:setT,curAdd=bk==="assessment"?addAQ:addT;
const sub=()=>{if(!fm.q.trim()||!fm.a.trim())return;const q={cat:fm.cat,pts:fm.pts,type:fm.type,q:fm.q.trim(),a:fm.a.trim()};if(fm.type==="mc")q.options=fm.options.filter(o=>o.trim());curAdd(q);setFm(p=>({...p,q:"",a:"",options:["","","",""]}))};

return html`<div class="fu">
<h2 class="m" style=${{fontSize:18,fontWeight:800,marginBottom:12}}>✏️ Builder</h2>
<div style=${{display:"flex",gap:6,marginBottom:14}}>
<button onClick=${()=>setBk("training")} style=${{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:700,background:bk==="training"?"#eab30822":"#0f1629",border:"2px solid "+(bk==="training"?"#eab308":"#1e293b"),color:bk==="training"?"#eab308":"#64748b"}}>Training (${tQs.length})</button>
<button onClick=${()=>setBk("assessment")} style=${{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:700,background:bk==="assessment"?"#ef444422":"#0f1629",border:"2px solid "+(bk==="assessment"?"#ef4444":"#1e293b"),color:bk==="assessment"?"#ef4444":"#64748b"}}>Assessment (${aQs.length})</button></div>
<div style=${{maxWidth:540}}>
<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
<select value=${fm.cat} onChange=${e=>setFm(p=>({...p,cat:e.target.value}))} class="inp" style=${{fontSize:12,padding:7}}>${CATS.map(c=>html`<option key=${c}>${c}</option>`)}</select>
<select value=${fm.pts} onChange=${e=>setFm(p=>({...p,pts:+e.target.value}))} class="inp" style=${{fontSize:12,padding:7}}>${[5,10,15,20,25].map(v=>html`<option key=${v} value=${v}>${v}pts</option>`)}</select>
<select value=${fm.type} onChange=${e=>setFm(p=>({...p,type:e.target.value}))} class="inp" style=${{fontSize:12,padding:7}}><option value="buzzer">Buzzer</option><option value="mc">MC</option><option value="fill">Fill</option></select></div>
<textarea value=${fm.q} onInput=${e=>setFm(p=>({...p,q:e.target.value}))} placeholder="Question..." rows=${3} class="inp" style=${{marginBottom:8,resize:"vertical"}}/>
${fm.type==="mc"&&html`<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
${["A","B","C","D"].map((l,i)=>html`<input value=${fm.options[i]} onInput=${e=>{const o=[...fm.options];o[i]=e.target.value;setFm(p=>({...p,options:o}))}} placeholder=${"Option "+l} class="inp" style=${{fontSize:12,padding:7}}/>`)}</div>`}
<input value=${fm.a} onInput=${e=>setFm(p=>({...p,a:e.target.value}))} placeholder=${fm.type==="mc"?"Correct letter":"Answer"} onKeyDown=${e=>e.key==="Enter"&&sub()} class="inp" style=${{marginBottom:10}}/>
<button onClick=${sub} style=${{background:"#eab308",color:"#060a12",padding:"10px 24px",borderRadius:8,fontWeight:700}}>Add Question</button></div>
<div style=${{marginTop:20,maxHeight:400,overflowY:"auto"}}>${curQs.map((q,i)=>html`<div key=${q.id||i} style=${{background:"#0f1629",border:"1px solid #1e293b",borderRadius:8,padding:12,marginBottom:5,display:"flex",gap:8}}>
<div style=${{flex:1}}><span style=${{fontSize:10,color:CC[q.cat],fontWeight:700}}>${q.cat} · ${q.pts}pts</span><p style=${{fontSize:12,margin:"2px 0"}}>${q.q}</p><p style=${{fontSize:11,color:"#10b981"}}>${q.a}</p></div>
<button onClick=${()=>curSet(p=>p.filter((_,j)=>j!==i))} style=${{fontSize:11,color:"#ef4444",background:"#ef444415",padding:"4px 10px",borderRadius:6,alignSelf:"start",border:"1px solid #ef444433"}}>Del</button></div>`)}</div>
</div>`;
}

// ═══ TEAM ═══
function Team({players,setPlayers,hist}){
const[ed,setEd]=useState(null);const[ev,setEv]=useState("");const[nn,setNn]=useState("");
const days=Math.ceil((new Date("2026-07-31")-new Date())/864e5);
const gs=n=>{const e=hist.filter(h=>h.player===n),c=e.filter(h=>h.correct),pts=c.reduce((s,h)=>s+(h.pts||0),0),acc=e.length?Math.round(c.length/e.length*100):0;
let ses=0;if(e.length){ses=1;const sr=[...e].sort((a,b)=>(a.ts||0)-(b.ts||0));for(let i=1;i<sr.length;i++)if((sr[i].ts||0)-(sr[i-1].ts||0)>12e4)ses++}return{total:e.length,correct:c.length,pts,acc,ses}};
const rk=players.map(p=>({name:p,...gs(p)})).filter(p=>p.total>0).sort((a,b)=>b.pts-a.pts);

return html`<div class="fu">
<div style=${{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
<h2 class="m" style=${{fontSize:18,fontWeight:800}}>👥 Team</h2>
<div style=${{background:"#eab30810",border:"1px solid #eab30833",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
<div class="m" style=${{fontSize:24,fontWeight:800,color:"#eab308"}}>${days}</div><div style=${{fontSize:10,color:"#64748b"}}>days to go</div></div></div>

${rk.length>0&&html`<div style=${{marginBottom:24}}>
<h3 class="m" style=${{fontSize:14,fontWeight:700,color:"#eab308",marginBottom:12}}>LEADERBOARD</h3>
${rk.map((p,i)=>html`<div class="fu" style=${{background:i===0?"#eab30812":"#0f1629",border:"1px solid "+(i===0?"#eab30844":"#1e293b"),borderRadius:10,padding:"12px 16px",marginBottom:6}}>
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:6}}>
<div style=${{display:"flex",gap:10,alignItems:"center"}}><span style=${{fontSize:18}}>${["🥇","🥈","🥉"][i]||"#"+(i+1)}</span><span style=${{fontWeight:700,fontSize:15}}>${p.name}</span></div>
<span class="m" style=${{fontSize:20,fontWeight:800,color:i===0?"#eab308":"#e2e8f0"}}>${p.pts}</span></div>
<div style=${{display:"flex",gap:12,paddingLeft:38}}>
<span class="m" style=${{fontSize:11,color:p.acc>=80?"#10b981":p.acc>=50?"#eab308":"#ef4444",fontWeight:700}}>${p.acc}%</span><span style=${{fontSize:10,color:"#64748b"}}>acc</span>
<span class="m" style=${{fontSize:11,color:"#06b6d4",fontWeight:700}}>${p.ses}</span><span style=${{fontSize:10,color:"#64748b"}}>sessions</span>
</div></div>`)}</div>`}

<h3 class="m" style=${{fontSize:14,fontWeight:700,color:"#94a3b8",marginBottom:10}}>PLAYERS</h3>
<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8,marginBottom:16}}>
${players.map((p,i)=>html`<div style=${{background:"#0f1629",border:"1px solid #1e293b",borderRadius:10,padding:14}}>
${ed===i?html`<div style=${{display:"flex",gap:6}}>
<input value=${ev} onInput=${e=>setEv(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"&&ev.trim()){setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null)}}} class="inp" style=${{fontSize:15}}/>
<button onClick=${()=>{if(ev.trim())setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null)}} style=${{background:"#10b981",color:"#060a12",padding:"10px 16px",borderRadius:8,fontWeight:700}}>Save</button></div>`
:html`<div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style=${{fontSize:16,fontWeight:700}}>${p}</span>
<div style=${{display:"flex",gap:6}}>
<button onClick=${()=>{setEd(i);setEv(p)}} style=${{fontSize:12,color:"#eab308",background:"#eab30815",padding:"5px 12px",borderRadius:6,fontWeight:600,border:"1px solid #eab30833"}}>Edit</button>
${players.length>1&&html`<button onClick=${()=>setPlayers(pr=>pr.filter((_,j)=>j!==i))} style=${{fontSize:12,color:"#ef4444",background:"#ef444415",padding:"5px 10px",borderRadius:6,border:"1px solid #ef444433"}}>×</button>`}
</div></div>`}</div>`)}</div>
${players.length<12&&html`<div style=${{display:"flex",gap:6}}>
<input value=${nn} onInput=${e=>setNn(e.target.value)} placeholder="Add player..." onKeyDown=${e=>{if(e.key==="Enter"&&nn.trim()){setPlayers(p=>[...p,nn.trim()]);setNn("")}}} class="inp" style=${{maxWidth:240}}/>
<button onClick=${()=>{if(nn.trim()){setPlayers(p=>[...p,nn.trim()]);setNn("")}}} style=${{background:"#eab308",color:"#060a12",padding:"8px 16px",borderRadius:6,fontWeight:700}}>Add</button></div>`}
</div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
