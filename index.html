// ─── TRAINING ────────────────────────────────────────────────────────
function Train({qs,players,addH}){
const [ph,setPh]=useState("setup");const [cfg,setCfg]=useState({cats:[...CATS],n:20});
const [pl,setPl]=useState("");const [dk,setDk]=useState([]);const [ix,setIx]=useState(0);
const [sc,setSc]=useState(0);const [res,setRes]=useState([]);const [sa,setSa]=useState(false);
const [ans,setAns]=useState(false);const [tm,setTm]=useState(15);const [ta,setTa]=useState(true);const ref=useRef(null);

const go=()=>{if(!pl)return;const p=qs.filter(q=>cfg.cats.includes(q.cat));const s=[...p].sort(()=>Math.random()-.5).slice(0,cfg.n);if(!s.length)return;setDk(s);setIx(0);setSc(0);setRes([]);setSa(false);setAns(false);setTm(15);setTa(true);setPh("play");};
useEffect(()=>{if(ph==="play"&&ta&&tm>0)ref.current=setTimeout(()=>setTm(t=>t-1),1000);else if(ph==="play"&&ta&&tm===0){setTa(false);setSa(true);}return()=>clearTimeout(ref.current);},[tm,ta,ph]);
const buzz=()=>{setTa(false);setSa(true);};
const yes=()=>{if(ans)return;const q=dk[ix];setSc(s=>s+q.pts);setRes(p=>[...p,{c:true,pts:q.pts}]);addH({player:pl,cat:q.cat,pts:q.pts,correct:true,mode:"train"});setAns(true);};
const no=()=>{if(ans)return;const q=dk[ix];setRes(p=>[...p,{c:false,pts:q.pts}]);addH({player:pl,cat:q.cat,pts:q.pts,correct:false,mode:"train"});setAns(true);};
const nx=()=>{if(!ans){const q=dk[ix];setRes(p=>[...p,{c:false,pts:q.pts}]);addH({player:pl,cat:q.cat,pts:q.pts,correct:false,mode:"train"});}if(ix+1>=dk.length){setPh("results");return;}setIx(i=>i+1);setSa(false);setAns(false);setTm(15);setTa(true);};

if(ph==="setup")return(<div className="fu">
<h2 className="mono" style={{fontSize:18,fontWeight:800,marginBottom:6}}>⚡ Training Quiz</h2>
<p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Drill daily! Pick your name and go.{qs.length===0&&<span style={{color:"#eab308"}}> Questions coming soon!</span>}</p>
{qs.length>0&&<><div style={{marginBottom:16}}><label className="mono" style={{fontSize:12,fontWeight:700,color:"#eab308",display:"block",marginBottom:6}}>WHO ARE YOU?</label>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>{players.map(p=><button key={p} onClick={()=>setPl(p)} style={{padding:"10px",borderRadius:8,fontSize:13,fontWeight:pl===p?700:500,background:pl===p?"#eab30822":"#0f1629",border:`2px solid ${pl===p?"#eab308":"#1e293b"}`,color:pl===p?"#eab308":"#94a3b8"}}>{p}</button>)}</div></div>
<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>{CATS.map(c=>{const n=qs.filter(q=>q.cat===c).length;return<button key={c} onClick={()=>setCfg(p=>({...p,cats:p.cats.includes(c)?p.cats.filter(x=>x!==c):[...p.cats,c]}))} style={{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:cfg.cats.includes(c)?CC[c]+"20":"#0f1629",color:cfg.cats.includes(c)?CC[c]:"#64748b",border:`1px solid ${cfg.cats.includes(c)?CC[c]+"44":"#1e293b"}`}}>{c} ({n})</button>;})}</div>
<button onClick={go} disabled={!pl} style={{background:pl?"#eab308":"#1e293b",color:pl?"#060a12":"#64748b",padding:"12px 32px",borderRadius:8,fontSize:14,fontWeight:700}}>{pl?`Start as ${pl}`:"Select name"}</button></>}</div>);

if(ph==="results"){const c=res.filter(r=>r.c).length,t=res.length,p=t>0?Math.round(c/t*100):0;return(<div className="fu" style={{textAlign:"center",maxWidth:440,margin:"0 auto"}}>
<div style={{fontSize:52}}>{p>=80?"🔥":p>=50?"💪":"📚"}</div>
<h2 className="mono" style={{fontSize:20,fontWeight:800,color:"#eab308",marginBottom:4}}>Done!</h2><p style={{fontSize:15}}>{pl}</p>
<div style={{display:"flex",justifyContent:"center",gap:20,margin:"12px 0 20px"}}>
<div><div className="mono" style={{fontSize:28,fontWeight:800,color:"#eab308"}}>{sc}</div><div style={{fontSize:10,color:"#64748b"}}>pts</div></div>
<div><div className="mono" style={{fontSize:28,fontWeight:800,color:"#10b981"}}>{c}/{t}</div><div style={{fontSize:10,color:"#64748b"}}>correct</div></div>
<div><div className="mono" style={{fontSize:28,fontWeight:800,color:p>=80?"#10b981":p>=50?"#eab308":"#ef4444"}}>{p}%</div><div style={{fontSize:10,color:"#64748b"}}>accuracy</div></div>
</div><button onClick={()=>setPh("setup")} style={{background:"#eab308",color:"#060a12",padding:"12px 32px",borderRadius:8,fontWeight:700}}>Go Again</button></div>);}

const cur=dk[ix];const at=cur.type==="mc"&&cur.options?`${cur.a}. ${cur.options[["A","B","C","D","E"].indexOf(cur.a)]||cur.a}`:cur.a;
return(<div className="fu">
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span className="mono" style={{fontSize:12,color:"#64748b"}}>Q {ix+1}/{dk.length} · {pl}</span><span className="mono" style={{fontSize:14,fontWeight:700,color:"#eab308"}}>{sc} pts</span></div>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{flex:1,height:3,background:"#1e293b",borderRadius:2}}><div style={{width:`${(tm/15)*100}%`,height:"100%",background:tm<=5?"#ef4444":"#eab308",borderRadius:2,transition:"width 1s linear"}}/></div><span className="mono" style={{fontSize:16,fontWeight:700,color:tm<=5?"#ef4444":"#eab308"}}>{tm}s</span></div>
<div style={{background:"#0f1629",borderRadius:14,padding:24,border:"1px solid #1e293b",marginBottom:16}}>
<div style={{display:"flex",gap:6,marginBottom:14}}><span style={{padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700,background:CC[cur.cat]+"20",color:CC[cur.cat]}}>{cur.cat}</span><span style={{padding:"3px 8px",borderRadius:16,fontSize:11,fontWeight:700,background:"#eab30820",color:"#eab308"}}>{cur.pts} pts</span></div>
<p style={{fontSize:17,lineHeight:1.55,fontWeight:500,marginBottom:16}}>{cur.q}</p>
{cur.type==="mc"&&cur.options&&!sa&&<div style={{display:"grid",gap:6,marginBottom:14}}>{cur.options.map((o,i)=><div key={i} style={{padding:"10px 14px",borderRadius:8,fontSize:13,background:"#1e293b",color:"#cbd5e1"}}><span className="mono" style={{fontWeight:700,marginRight:6}}>{["A","B","C","D"][i]}.</span>{o}</div>)}</div>}
{!sa&&<button onClick={buzz} style={{background:"linear-gradient(135deg,#ef4444,#b91c1c)",color:"white",padding:"14px 36px",borderRadius:12,fontSize:17,fontWeight:800,display:"block",margin:"0 auto",fontFamily:"'JetBrains Mono',monospace"}}>🔔 REVEAL</button>}
{sa&&<div className="fr" style={{background:"#10b98118",border:"2px solid #10b981",borderRadius:10,padding:16}}><p className="mono" style={{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:6}}>ANSWER</p><p style={{fontSize:20,fontWeight:800,color:"#fff"}}>{at}</p></div>}
</div>
{sa&&!ans&&<div className="fu" style={{marginBottom:14}}><p className="mono" style={{fontSize:12,color:"#64748b",marginBottom:8}}>DID YOU KNOW IT?</p><div style={{display:"flex",gap:10}}><button onClick={no} style={{flex:1,padding:13,borderRadius:10,fontSize:15,fontWeight:700,background:"#ef444418",color:"#ef4444",border:"1px solid #ef444433"}}>✗ Nope</button><button onClick={yes} style={{flex:1,padding:13,borderRadius:10,fontSize:15,fontWeight:700,background:"#10b98118",color:"#10b981",border:"1px solid #10b98133"}}>✓ Got It!</button></div></div>}
{ans&&<button onClick={nx} style={{width:"100%",background:"#eab308",color:"#060a12",padding:12,borderRadius:8,fontWeight:700}}>{ix+1>=dk.length?"Results":"Next →"}</button>}
{sa&&!ans&&<button onClick={nx} style={{width:"100%",marginTop:8,background:"#1e293b",color:"#64748b",padding:10,borderRadius:8,fontSize:12,border:"1px solid #2d3a50"}}>Skip</button>}
</div>);}

// ─── FLASHCARDS ──────────────────────────────────────────────────────
function Flash({qs,prog,setProg,hist}){
const [cat,setCat]=useState("All");const [dk,setDk]=useState([]);const [ix,setIx]=useState(0);const [fl,setFl]=useState(false);const [on,setOn]=useState(false);
const go=()=>{let p=cat==="All"?[...qs]:qs.filter(q=>q.cat===cat);p=p.map(q=>{const r=prog[q.id]||{r:0,w:0};return{...q,wt:Math.max(.1,1+r.w*2-r.r*.5)};}).sort((a,b)=>b.wt-a.wt).slice(0,30);for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));if(Math.random()<.3)[p[i],p[j]]=[p[j],p[i]];}if(!p.length)return;setDk(p);setIx(0);setFl(false);setOn(true);};
const mark=(c)=>{const q=dk[ix];setProg(prev=>{const p=prev[q.id]||{r:0,w:0};return{...prev,[q.id]:{r:p.r+(c?1:0),w:p.w+(c?0:1)}};});if(ix+1>=dk.length){setOn(false);return;}setIx(i=>i+1);setFl(false);};
const tR=Object.values(prog).reduce((s,p)=>s+p.r+p.w,0),tC=Object.values(prog).reduce((s,p)=>s+p.r,0);
const didQ=(hist||[]).some(h=>h.mode==="train"&&(h.ts||0)>Date.now()-864e5);

if(!on)return(<div className="fu">
<h2 className="mono" style={{fontSize:18,fontWeight:800,marginBottom:6}}>🃏 Flashcards</h2>
{!didQ?<div style={{background:"#ef444412",border:"1px solid #ef444433",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}}><span style={{fontSize:20}}>⚡</span><div><p style={{fontSize:13,fontWeight:700,color:"#ef4444"}}>Take a Training Quiz first!</p></div></div>
:<div style={{background:"#10b98112",border:"1px solid #10b98133",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",gap:10}}><span style={{fontSize:20}}>💪</span><div><p style={{fontSize:13,fontWeight:700,color:"#10b981"}}>Quiz done! Now drill weak spots.</p></div></div>}
<p style={{fontSize:13,color:"#64748b",marginBottom:16}}>Missed questions return more often.{tR>0&&` ${tR} reviews, ${Math.round(tC/tR*100)}% accuracy.`}</p>
{qs.length>0&&<><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>
<button onClick={()=>setCat("All")} style={{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:cat==="All"?"#eab30820":"#0f1629",color:cat==="All"?"#eab308":"#64748b",border:`1px solid ${cat==="All"?"#eab30844":"#1e293b"}`}}>All</button>
{CATS.map(c=>{const n=qs.filter(q=>q.cat===c).length;return n>0?<button key={c} onClick={()=>setCat(c)} style={{padding:"6px 12px",borderRadius:16,fontSize:11,fontWeight:600,background:cat===c?CC[c]+"20":"#0f1629",color:cat===c?CC[c]:"#64748b",border:`1px solid ${cat===c?CC[c]+"44":"#1e293b"}`}}>{c}</button>:null;})}</div>
<button onClick={go} style={{background:"linear-gradient(135deg,#7c3aed,#5b21b6)",color:"white",padding:"12px 32px",borderRadius:8,fontSize:14,fontWeight:700}}>Start Drill</button></>}
</div>);

const cur=dk[ix];const at=cur.type==="mc"&&cur.options?`${cur.a}. ${cur.options[["A","B","C","D","E"].indexOf(cur.a)]||cur.a}`:cur.a;
return(<div className="fu" style={{maxWidth:540,margin:"0 auto"}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span className="mono" style={{fontSize:12,color:"#64748b"}}>{ix+1}/{dk.length}</span><button onClick={()=>setOn(false)} style={{fontSize:11,color:"#64748b",background:"none",textDecoration:"underline"}}>End</button></div>
<div onClick={()=>!fl&&setFl(true)} style={{background:fl?"#1a1040":"#0f1629",border:`2px solid ${fl?"#a78bfa":"#1e293b"}`,borderRadius:16,padding:36,minHeight:220,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:fl?"default":"pointer",textAlign:"center"}}>
<span style={{fontSize:10,fontWeight:700,color:CC[cur.cat],marginBottom:12}}>{cur.cat}</span>
{!fl?<><p style={{fontSize:17,lineHeight:1.5,fontWeight:500,marginBottom:14}}>{cur.q}</p>{cur.type==="mc"&&cur.options&&<div style={{fontSize:12,color:"#64748b",textAlign:"left",width:"100%"}}>{cur.options.map((o,i)=><div key={i}>{["A","B","C","D"][i]}. {o}</div>)}</div>}<p style={{fontSize:11,color:"#475569",marginTop:12}}>Tap to reveal</p></>
:<div className="fr"><p className="mono" style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:10}}>ANSWER</p><p style={{fontSize:24,fontWeight:800,color:"#fff"}}>{at}</p></div>}
</div>
{fl&&<div className="fu" style={{display:"flex",gap:10,marginTop:16}}><button onClick={()=>mark(false)} style={{flex:1,padding:12,borderRadius:10,fontSize:15,fontWeight:700,background:"#ef444418",color:"#ef4444",border:"1px solid #ef444433"}}>✗ Missed</button><button onClick={()=>mark(true)} style={{flex:1,padding:12,borderRadius:10,fontSize:15,fontWeight:700,background:"#10b98118",color:"#10b981",border:"1px solid #10b98133"}}>✓ Got It</button></div>}
</div>);}

// ─── ASSESSMENT ──────────────────────────────────────────────────────
function Assess({qs,players,addH,named}){
const [ph,setPh]=useState("sel");const [pl,setPl]=useState("");const [dk,setDk]=useState([]);const [ix,setIx]=useState(0);
const [ans,setAns]=useState([]);const [typ,setTyp]=useState("");const [mc,setMc]=useState(null);const [tm,setTm]=useState(15);const ref=useRef(null);

const go=(list)=>{if(!pl||!list.length)return;setDk([...list].sort(()=>Math.random()-.5));setIx(0);setAns([]);setTyp("");setMc(null);setTm(15);setPh("play");};
useEffect(()=>{if(ph==="play"&&tm>0)ref.current=setTimeout(()=>setTm(t=>t-1),1000);else if(ph==="play"&&tm===0)submit();return()=>clearTimeout(ref.current);},[tm,ph,ix]);

const submit=()=>{const q=dk[ix];let ua="",ok=false;
if(q.type==="mc"&&q.options){ua=mc||"(none)";ok=mc===q.a;}
else{ua=typ.trim()||"(none)";const cl=s=>s.toLowerCase().replace(/[^a-z0-9\s]/g,"").trim();const uc=cl(ua),ac=cl(q.a);ok=uc===ac||ac.includes(uc)||uc.includes(ac);if(!ok&&ac.split(" ").length<=3)ok=ac.split(" ").filter(w=>w.length>3).some(w=>uc.includes(w));}
setAns(p=>[...p,{ui:ix,ua,ok,pts:q.pts,cat:q.cat}]);addH({player:pl,cat:q.cat,pts:ok?q.pts:0,correct:ok,mode:"assess"});
if(ix+1>=dk.length)setPh("res");else{setIx(i=>i+1);setTyp("");setMc(null);setTm(15);}};

if(ph==="sel")return(<div className="fu">
<h2 className="mono" style={{fontSize:18,fontWeight:800,marginBottom:6}}>📝 Assessment</h2>
<p style={{fontSize:13,color:"#64748b",marginBottom:16}}>15 seconds per question — go!</p>
<div style={{marginBottom:20}}><label className="mono" style={{fontSize:12,fontWeight:700,color:"#eab308",display:"block",marginBottom:6}}>WHO ARE YOU?</label>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>{players.map(p=><button key={p} onClick={()=>setPl(p)} style={{padding:"10px",borderRadius:8,fontSize:13,fontWeight:pl===p?700:500,background:pl===p?"#eab30822":"#0f1629",border:`2px solid ${pl===p?"#eab308":"#1e293b"}`,color:pl===p?"#eab308":"#94a3b8"}}>{p}</button>)}</div></div>
{named.length>0&&<div style={{marginBottom:20}}><label className="mono" style={{fontSize:12,fontWeight:700,color:"#ef4444",display:"block",marginBottom:8}}>ASSIGNED</label>
{named.map((a,i)=><button key={i} onClick={()=>pl&&go(a.questions)} disabled={!pl} style={{width:"100%",background:"#0f1629",border:"1px solid #ef444433",borderRadius:10,padding:"14px 16px",textAlign:"left",color:"#e2e8f0",opacity:pl?1:.5,marginBottom:8}}><div style={{fontWeight:700}}>{a.name}</div><div style={{fontSize:11,color:"#64748b"}}>{a.questions.length} questions</div></button>)}</div>}
{qs.length>0&&<button onClick={()=>go(qs)} disabled={!pl} style={{background:pl?"#1e293b":"#0f1629",color:pl?"#e2e8f0":"#475569",padding:"10px 20px",borderRadius:8,border:"1px solid #2d3a50"}}>Random Practice ({qs.length} Qs)</button>}
</div>);

if(ph==="res"){const ok=ans.filter(a=>a.ok).length,t=ans.length,p=t>0?Math.round(ok/t*100):0;
const bc={};ans.forEach(a=>{if(!bc[a.cat])bc[a.cat]={c:0,t:0};bc[a.cat].t++;if(a.ok)bc[a.cat].c++;});
return(<div className="fu" style={{maxWidth:500,margin:"0 auto"}}>
<div style={{textAlign:"center",marginBottom:20}}><div style={{fontSize:52}}>{p>=80?"🔥":p>=60?"💪":"📚"}</div>
<h2 className="mono" style={{fontSize:20,fontWeight:800,color:"#eab308"}}>Done!</h2><p>{pl}</p>
<div style={{display:"flex",justifyContent:"center",gap:20,marginTop:12}}>
<div><div className="mono" style={{fontSize:28,fontWeight:800,color:"#10b981"}}>{ok}/{t}</div><div style={{fontSize:10,color:"#64748b"}}>correct</div></div>
<div><div className="mono" style={{fontSize:28,fontWeight:800,color:p>=80?"#10b981":p>=50?"#eab308":"#ef4444"}}>{p}%</div><div style={{fontSize:10,color:"#64748b"}}>accuracy</div></div></div></div>
<h3 className="mono" style={{fontSize:13,color:"#94a3b8",marginBottom:8}}>BY CATEGORY</h3>
{Object.entries(bc).map(([cat,s])=>{const cp=Math.round(s.c/s.t*100);return<div key={cat} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1e293b"}}><span style={{fontSize:12,fontWeight:700,color:CC[cat],minWidth:90}}>{cat}</span><div style={{flex:1,height:6,background:"#1e293b",borderRadius:3}}><div style={{width:`${cp}%`,height:"100%",background:cp>=80?"#10b981":cp>=50?"#eab308":"#ef4444",borderRadius:3}}/></div><span className="mono" style={{fontSize:12,fontWeight:700,color:cp>=80?"#10b981":cp>=50?"#eab308":"#ef4444"}}>{cp}%</span></div>;})}
<h3 className="mono" style={{fontSize:13,color:"#94a3b8",margin:"16px 0 8px"}}>REVIEW</h3>
{ans.map((a,i)=>{const q=dk[a.ui];const at=q.type==="mc"&&q.options?`${q.a}. ${q.options[["A","B","C","D","E"].indexOf(q.a)]||q.a}`:q.a;return<div key={i} style={{background:"#0f1629",border:`1px solid ${a.ok?"#10b98133":"#ef444433"}`,borderRadius:8,padding:12,marginBottom:5}}><div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:10,color:CC[q.cat],fontWeight:700}}>{q.cat}</span><span style={{fontWeight:800,color:a.ok?"#10b981":"#ef4444"}}>{a.ok?"✓":"✗"}</span></div><p style={{fontSize:13,margin:"4px 0"}}>{q.q}</p>{!a.ok&&<p style={{fontSize:12,color:"#ef4444"}}>You: {a.ua}</p>}<p style={{fontSize:12,color:"#10b981"}}>Answer: {at}</p></div>;})}
<button onClick={()=>setPh("sel")} style={{width:"100%",marginTop:16,background:"#eab308",color:"#060a12",padding:12,borderRadius:8,fontWeight:700}}>Done</button>
</div>);}

const cur=dk[ix];
return(<div className="fu">
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span className="mono" style={{fontSize:12,color:"#64748b"}}>Q {ix+1}/{dk.length}</span><span className="mono" style={{fontSize:12,fontWeight:700,color:"#10b981"}}>{ans.filter(a=>a.ok).length} correct</span></div>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{flex:1,height:5,background:"#1e293b",borderRadius:3}}><div style={{width:`${(tm/15)*100}%`,height:"100%",background:tm<=5?"#ef4444":"#10b981",borderRadius:3,transition:"width 1s linear"}}/></div><span className="mono" style={{fontSize:20,fontWeight:800,color:tm<=5?"#ef4444":"#eab308"}}>{tm}s</span></div>
<div style={{background:"#0f1629",borderRadius:14,padding:24,border:`1px solid ${tm<=5?"#ef444444":"#1e293b"}`,marginBottom:16}}>
<div style={{display:"flex",gap:6,marginBottom:12}}><span style={{padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700,background:CC[cur.cat]+"20",color:CC[cur.cat]}}>{cur.cat}</span><span style={{padding:"3px 8px",borderRadius:16,fontSize:11,fontWeight:700,background:"#eab30820",color:"#eab308"}}>{cur.pts} pts</span></div>
<p style={{fontSize:18,lineHeight:1.55,fontWeight:600,marginBottom:16}}>{cur.q}</p>
{cur.type==="mc"&&cur.options?<div style={{display:"grid",gap:6}}>{cur.options.map((o,i)=>{const l=["A","B","C","D"][i];return<button key={i} onClick={()=>setMc(l)} style={{padding:"12px 14px",borderRadius:8,fontSize:14,textAlign:"left",background:mc===l?"#eab30822":"#1e293b",border:`2px solid ${mc===l?"#eab308":"#2d3a50"}`,color:mc===l?"#eab308":"#cbd5e1",fontWeight:mc===l?700:400}}><span className="mono" style={{fontWeight:700,marginRight:8}}>{l}.</span>{o}</button>;})}</div>
:<input value={typ} onChange={e=>setTyp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&typ.trim()&&submit()} placeholder="Type answer..." autoFocus className="inp" style={{fontSize:16}}/>}
</div>
<button onClick={submit} disabled={cur.type==="mc"?!mc:!typ.trim()} style={{width:"100%",padding:14,borderRadius:10,fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",background:(cur.type==="mc"?mc:typ.trim())?"#eab308":"#1e293b",color:(cur.type==="mc"?mc:typ.trim())?"#060a12":"#64748b"}}>SUBMIT →</button>
</div>);}

// ─── BUILDER ─────────────────────────────────────────────────────────
function Build({addT,trainQs,setTrainQs,assessQs,setAssessQs,addA,named,setNamed}){
const [bk,setBk]=useState("training");const [md,setMd]=useState("manual");
const [fm,setFm]=useState({cat:CATS[0],pts:10,type:"buzzer",q:"",a:"",options:["","","",""]});
const [showBld,setShowBld]=useState(false);const [nm,setNm]=useState("");const [fCat,setFCat]=useState("All");const [sel,setSel]=useState(new Set());
const [eix,setEix]=useState(null);const [ef,setEf]=useState({q:"",a:""});

const curAdd=bk==="assessment"?addA:addT;const curQs=bk==="assessment"?assessQs:trainQs;const curSet=bk==="assessment"?setAssessQs:setTrainQs;
const sub=()=>{if(!fm.q.trim()||!fm.a.trim())return;const q={cat:fm.cat,pts:fm.pts,type:fm.type,q:fm.q.trim(),a:fm.a.trim()};if(fm.type==="mc")q.options=fm.options.filter(o=>o.trim());curAdd(q);setFm(p=>({...p,q:"",a:"",options:["","","",""]}));};

return(<div className="fu">
<h2 className="mono" style={{fontSize:18,fontWeight:800,marginBottom:6}}>✏️ Builder</h2>
<div style={{display:"flex",gap:6,marginBottom:14}}>
<button onClick={()=>setBk("training")} style={{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:700,background:bk==="training"?"#eab30822":"#0f1629",border:`2px solid ${bk==="training"?"#eab308":"#1e293b"}`,color:bk==="training"?"#eab308":"#64748b"}}>Training ({trainQs.length})</button>
<button onClick={()=>setBk("assessment")} style={{padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:700,background:bk==="assessment"?"#ef444422":"#0f1629",border:`2px solid ${bk==="assessment"?"#ef4444":"#1e293b"}`,color:bk==="assessment"?"#ef4444":"#64748b"}}>Assessment ({assessQs.length})</button></div>

{bk==="assessment"&&<div style={{background:"#0f1629",border:"1px solid #1e293b",borderRadius:10,padding:16,marginBottom:16}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><h3 className="mono" style={{fontSize:13,fontWeight:700,color:"#ef4444"}}>NAMED ({named.length})</h3><button onClick={()=>setShowBld(!showBld)} style={{fontSize:11,color:showBld?"#64748b":"#eab308",background:showBld?"#1e293b":"#eab30815",padding:"5px 12px",borderRadius:6,border:`1px solid ${showBld?"#2d3a50":"#eab30833"}`}}>{showBld?"Cancel":"+ Create"}</button></div>
{showBld&&<div style={{background:"#1e293b",borderRadius:8,padding:14,marginBottom:12}}>
<input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Name (e.g. 'Week 1')" className="inp" style={{marginBottom:10}}/>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,fontWeight:700,color:"#eab308"}}>{sel.size} selected</span><div><button onClick={()=>setSel(new Set(assessQs.filter(q=>fCat==="All"||q.cat===fCat).map(q=>q.id)))} style={{fontSize:10,color:"#10b981",background:"none",marginRight:8}}>All</button><button onClick={()=>setSel(new Set())} style={{fontSize:10,color:"#64748b",background:"none"}}>Clear</button></div></div>
<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
<button onClick={()=>setFCat("All")} style={{padding:"4px 8px",borderRadius:8,fontSize:10,background:fCat==="All"?"#eab30820":"transparent",color:fCat==="All"?"#eab308":"#475569",border:"1px solid #2d3a50"}}>All</button>
{CATS.map(c=>{const n=assessQs.filter(q=>q.cat===c).length;return n>0?<button key={c} onClick={()=>setFCat(c)} style={{padding:"4px 8px",borderRadius:8,fontSize:10,background:fCat===c?CC[c]+"20":"transparent",color:fCat===c?CC[c]:"#475569",border:`1px solid ${fCat===c?CC[c]+"44":"#2d3a50"}`}}>{c} ({n})</button>:null;})}</div>
<div style={{maxHeight:250,overflowY:"auto",marginBottom:12}}>{assessQs.filter(q=>fCat==="All"||q.cat===fCat).map((q,i)=><label key={q.id||i} style={{display:"flex",gap:8,padding:6,cursor:"pointer",borderBottom:"1px solid #0f1629",background:sel.has(q.id)?"#eab30808":"transparent"}}>
<input type="checkbox" checked={sel.has(q.id)} onChange={e=>{const n=new Set(sel);e.target.checked?n.add(q.id):n.delete(q.id);setSel(n);}} style={{marginTop:3,accentColor:"#eab308",minWidth:16,minHeight:16}}/>
<div><span style={{fontSize:10,color:CC[q.cat],fontWeight:700}}>{q.cat} · {q.pts}pts</span><p style={{fontSize:12,color:"#cbd5e1"}}>{q.q}</p></div></label>)}</div>
<button onClick={()=>{if(!nm.trim()||!sel.size)return;setNamed(p=>[...p,{name:nm.trim(),questions:assessQs.filter(q=>sel.has(q.id)),createdAt:Date.now()}]);setNm("");setSel(new Set());setShowBld(false);}} disabled={!nm.trim()||!sel.size} style={{background:(nm.trim()&&sel.size)?"#ef4444":"#2d3a50",color:(nm.trim()&&sel.size)?"white":"#475569",padding:"10px 20px",borderRadius:8,fontWeight:700}}>Create with {sel.size} Qs</button>
</div>}
{named.map((a,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #1e293b"}}><div><b>{a.name}</b><div style={{fontSize:11,color:"#64748b"}}>{a.questions.length} Qs</div></div><button onClick={()=>setNamed(p=>p.filter((_,j)=>j!==i))} style={{fontSize:11,color:"#ef4444",background:"#ef444415",padding:"4px 10px",borderRadius:6,border:"1px solid #ef444433"}}>Del</button></div>)}
</div>}

<div style={{display:"flex",gap:3,background:"#0f1629",borderRadius:8,padding:3,marginBottom:20}}>
{["manual","browse"].map(t=><button key={t} onClick={()=>setMd(t)} style={{padding:"7px 14px",borderRadius:6,fontSize:12,fontWeight:md===t?700:400,background:md===t?"#eab308":"transparent",color:md===t?"#060a12":"#64748b"}}>{t==="manual"?"Manual":"Browse"}</button>)}</div>

{md==="manual"&&<div style={{maxWidth:540}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
<select value={fm.cat} onChange={e=>setFm(p=>({...p,cat:e.target.value}))} className="inp" style={{fontSize:12,padding:7}}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
<select value={fm.pts} onChange={e=>setFm(p=>({...p,pts:+e.target.value}))} className="inp" style={{fontSize:12,padding:7}}>{PTS.map(v=><option key={v} value={v}>{v}pts</option>)}</select>
<select value={fm.type} onChange={e=>setFm(p=>({...p,type:e.target.value}))} className="inp" style={{fontSize:12,padding:7}}><option value="buzzer">Buzzer</option><option value="mc">MC</option><option value="fill">Fill</option></select></div>
<textarea value={fm.q} onChange={e=>setFm(p=>({...p,q:e.target.value}))} placeholder="Question..." rows={3} className="inp" style={{marginBottom:8,resize:"vertical"}}/>
{fm.type==="mc"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>{["A","B","C","D"].map((l,i)=><input key={l} value={fm.options[i]} onChange={e=>{const o=[...fm.options];o[i]=e.target.value;setFm(p=>({...p,options:o}));}} placeholder={`Option ${l}`} className="inp" style={{fontSize:12,padding:7}}/>)}</div>}
<input value={fm.a} onChange={e=>setFm(p=>({...p,a:e.target.value}))} placeholder={fm.type==="mc"?"Correct letter":"Answer"} onKeyDown={e=>e.key==="Enter"&&sub()} className="inp" style={{marginBottom:10}}/>
<button onClick={sub} style={{background:"#eab308",color:"#060a12",padding:"10px 24px",borderRadius:8,fontWeight:700}}>Add Question</button></div>}

{md==="browse"&&<div style={{maxHeight:500,overflowY:"auto"}}>{curQs.length===0?<p style={{color:"#64748b"}}>No questions.</p>:curQs.map((q,i)=><div key={q.id||i} style={{background:"#0f1629",border:"1px solid #1e293b",borderRadius:8,padding:12,marginBottom:5}}>
{eix===i?<div><textarea value={ef.q} onChange={e=>setEf(p=>({...p,q:e.target.value}))} rows={2} className="inp" style={{marginBottom:6,fontSize:13}}/>
<input value={ef.a} onChange={e=>setEf(p=>({...p,a:e.target.value}))} className="inp" style={{marginBottom:8,fontSize:13}}/>
<div style={{display:"flex",gap:6}}><button onClick={()=>{curSet(p=>p.map((x,j)=>j===i?{...x,q:ef.q.trim(),a:ef.a.trim()}:x));setEix(null);}} style={{background:"#10b981",color:"#060a12",padding:"7px 16px",borderRadius:6,fontWeight:700}}>Save</button><button onClick={()=>setEix(null)} style={{background:"#1e293b",color:"#64748b",padding:"7px 16px",borderRadius:6,border:"1px solid #2d3a50"}}>Cancel</button></div></div>
:<div style={{display:"flex",gap:8}}><div style={{flex:1}}><span style={{fontSize:10,color:CC[q.cat],fontWeight:700}}>{q.cat} · {q.pts}pts</span><p style={{fontSize:12,margin:"2px 0"}}>{q.q}</p><p style={{fontSize:11,color:"#10b981"}}>{q.a}</p></div>
<div style={{display:"flex",flexDirection:"column",gap:4}}><button onClick={()=>{setEix(i);setEf({q:q.q,a:q.a});}} style={{fontSize:11,color:"#eab308",background:"#eab30815",padding:"4px 10px",borderRadius:6,border:"1px solid #eab30833"}}>Edit</button><button onClick={()=>curSet(p=>p.filter((_,j)=>j!==i))} style={{fontSize:11,color:"#ef4444",background:"#ef444415",padding:"4px 10px",borderRadius:6,border:"1px solid #ef444433"}}>Del</button></div></div>}
</div>)}</div>}
</div>);}

// ─── TEAM ────────────────────────────────────────────────────────────
function Team({players,setPlayers,hist}){
const [ed,setEd]=useState(null);const [ev,setEv]=useState("");const [nn,setNn]=useState("");
const days=Math.ceil((new Date("2026-07-31")-new Date())/864e5);
const gs=n=>{const e=hist.filter(h=>h.player===n),c=e.filter(h=>h.correct),pts=c.reduce((s,h)=>s+(h.pts||0),0),acc=e.length>0?Math.round(c.length/e.length*100):0;let ses=0;if(e.length>0){ses=1;const sr=[...e].sort((a,b)=>(a.ts||0)-(b.ts||0));for(let i=1;i<sr.length;i++)if((sr[i].ts||0)-(sr[i-1].ts||0)>12e4)ses++;}return{total:e.length,correct:c.length,pts,acc,ses};};
const rk=players.map(p=>({name:p,...gs(p)})).filter(p=>p.total>0).sort((a,b)=>b.pts-a.pts);

return(<div className="fu">
<div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
<div><h2 className="mono" style={{fontSize:18,fontWeight:800}}>👥 Team</h2></div>
<div style={{background:"#eab30810",border:"1px solid #eab30833",borderRadius:10,padding:"10px 16px",textAlign:"center"}}><div className="mono" style={{fontSize:24,fontWeight:800,color:"#eab308"}}>{days}</div><div style={{fontSize:10,color:"#64748b"}}>days to go</div></div></div>

{rk.length>0&&<div style={{marginBottom:24}}><h3 className="mono" style={{fontSize:14,fontWeight:700,color:"#eab308",marginBottom:12}}>LEADERBOARD</h3>
{rk.map((p,i)=><div key={p.name} className="fu" style={{background:i===0?"#eab30812":"#0f1629",border:`1px solid ${i===0?"#eab30844":"#1e293b"}`,borderRadius:10,padding:"12px 16px",marginBottom:6}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:18}}>{["🥇","🥈","🥉"][i]||`#${i+1}`}</span><span style={{fontWeight:700,fontSize:15}}>{p.name}</span></div><span className="mono" style={{fontSize:20,fontWeight:800,color:i===0?"#eab308":"#e2e8f0"}}>{p.pts}</span></div>
<div style={{display:"flex",gap:12,paddingLeft:38}}>
<span><span className="mono" style={{fontSize:11,color:p.acc>=80?"#10b981":p.acc>=50?"#eab308":"#ef4444",fontWeight:700}}>{p.acc}%</span> <span style={{fontSize:10,color:"#64748b"}}>acc</span></span>
<span><span className="mono" style={{fontSize:11,color:"#06b6d4",fontWeight:700}}>{p.ses}</span> <span style={{fontSize:10,color:"#64748b"}}>sessions</span></span>
<span><span className="mono" style={{fontSize:11,color:"#94a3b8",fontWeight:700}}>{p.correct}/{p.total}</span> <span style={{fontSize:10,color:"#64748b"}}>correct</span></span>
</div></div>)}</div>}

<h3 className="mono" style={{fontSize:14,fontWeight:700,color:"#94a3b8",marginBottom:10}}>PLAYERS</h3>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8,marginBottom:16}}>
{players.map((p,i)=><div key={i} style={{background:"#0f1629",border:"1px solid #1e293b",borderRadius:10,padding:14}}>
{ed===i?<div style={{display:"flex",gap:6}}><input value={ev} onChange={e=>setEv(e.target.value)} autoFocus onKeyDown={e=>e.key==="Enter"&&(()=>{if(ev.trim())setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null);})()}className="inp" style={{fontSize:15}}/>
<button onClick={()=>{if(ev.trim())setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null);}} style={{background:"#10b981",color:"#060a12",padding:"10px 16px",borderRadius:8,fontWeight:700}}>Save</button></div>
:<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:16,fontWeight:700}}>{p}</span><div style={{display:"flex",gap:6}}>
<button onClick={()=>{setEd(i);setEv(p);}} style={{fontSize:12,color:"#eab308",background:"#eab30815",padding:"5px 12px",borderRadius:6,fontWeight:600,border:"1px solid #eab30833"}}>Edit</button>
{players.length>1&&<button onClick={()=>setPlayers(pr=>pr.filter((_,j)=>j!==i))} style={{fontSize:12,color:"#ef4444",background:"#ef444415",padding:"5px 10px",borderRadius:6,border:"1px solid #ef444433"}}>×</button>}</div></div>}
</div>)}</div>
{players.length<12&&<div style={{display:"flex",gap:6}}><input value={nn} onChange={e=>setNn(e.target.value)} placeholder="Add player..." onKeyDown={e=>e.key==="Enter"&&nn.trim()&&(()=>{setPlayers(p=>[...p,nn.trim()]);setNn("");})()}className="inp" style={{maxWidth:240}}/>
<button onClick={()=>{if(nn.trim()){setPlayers(p=>[...p,nn.trim()]);setNn("");}}} style={{background:"#eab308",color:"#060a12",padding:"8px 16px",borderRadius:6,fontWeight:700}}>Add</button></div>}
</div>);}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
