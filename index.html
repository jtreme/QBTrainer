{id:"mr6",cat:"Quantitative",pts:20,type:"buzzer",q:"Monopolist: P = 90 − 2Q, MC = 10. Find profit-max Q and the price charged.",a:"Q = 20, P = $50 (MR = 90 − 4Q = 10 → Q = 20; P = 90 − 40 = 50)"},
{id:"mr7",cat:"Quantitative",pts:25,type:"buzzer",q:"Monopolist: P = 90 − 2Q, MC = 10, Q = 20, P = $50. If ATC = $30, what is total profit?",a:"$400 (profit/unit = 50 − 30 = 20; total = 20 × 20)"},

// ══ NEW: REGRESSION DIAGNOSTICS ══
{id:"reg1",cat:"Quantitative",pts:10,type:"buzzer",q:"In OLS regression, what does the coefficient β₁ represent?",a:"The change in the dependent variable for a one-unit increase in the independent variable, holding all else constant"},
{id:"reg2",cat:"Quantitative",pts:10,type:"buzzer",q:"What does R² measure in a regression?",a:"The proportion of variation in the dependent variable explained by the independent variable(s) — ranges from 0 to 1"},
{id:"reg3",cat:"Quantitative",pts:15,type:"mc",q:"Heteroskedasticity means:",a:"C",options:["Errors are correlated over time","There are too many independent variables","Error variance is not constant across observations","The model has omitted variables"]},
{id:"reg4",cat:"Quantitative",pts:20,type:"buzzer",q:"What are two consequences of heteroskedasticity in OLS?",a:"OLS estimates remain unbiased but are no longer efficient (BLUE); standard errors are wrong, making hypothesis tests unreliable"},
{id:"reg5",cat:"Quantitative",pts:15,type:"mc",q:"Autocorrelation (serial correlation) is most common in which type of data?",a:"B",options:["Cross-sectional","Time series","Panel","Survey"]},
{id:"reg6",cat:"Quantitative",pts:20,type:"buzzer",q:"The Durbin-Watson statistic tests for what?",a:"First-order autocorrelation in regression residuals — values near 2 indicate no autocorrelation"},
{id:"reg7",cat:"Quantitative",pts:15,type:"buzzer",q:"What is multicollinearity and when does it cause problems?",a:"When independent variables are highly correlated with each other — makes it hard to isolate individual effects; standard errors inflate"},
{id:"reg8",cat:"Quantitative",pts:20,type:"mc",q:"The Variance Inflation Factor (VIF) is used to detect:",a:"D",options:["Heteroskedasticity","Autocorrelation","Omitted variable bias","Multicollinearity"]},
{id:"reg9",cat:"Quantitative",pts:10,type:"buzzer",q:"In a regression output, what does a p-value of 0.03 on a coefficient mean?",a:"We reject the null hypothesis that the coefficient = 0 at the 5% significance level; the variable is statistically significant"},
{id:"reg10",cat:"Quantitative",pts:15,type:"mc",q:"A dummy variable in a regression takes values of:",a:"A",options:["0 or 1","Any integer","Any real number","Only positive values"]},
{id:"reg11",cat:"Quantitative",pts:20,type:"buzzer",q:"You run: Yield = β₀ + β₁(Fertilizer) + β₂(Irrigated) + ε, where Irrigated = 1 if field is irrigated, 0 if not. Interpret β₂ = 4.2.",a:"Irrigated fields produce 4.2 more units of yield than non-irrigated fields, holding fertilizer constant"},
{id:"reg12",cat:"Quantitative",pts:25,type:"buzzer",q:"What is omitted variable bias and what does it do to OLS estimates?",a:"When a relevant variable is left out of the model — causes OLS estimates to be biased and inconsistent if the omitted variable is correlated with included regressors"},
{id:"reg13",cat:"Quantitative",pts:15,type:"mc",q:"In hypothesis testing, alpha (α) is:",a:"B",options:["The regression intercept","The probability of a Type I error (false positive)","The regression slope","The probability of a Type II error"]},
{id:"reg14",cat:"Quantitative",pts:10,type:"mc",q:"If you fail to reject H₀ when H₀ is actually false, you have committed:",a:"C",options:["A correct decision","A Type I error","A Type II error","An omitted variable error"]},
{id:"reg15",cat:"Quantitative",pts:20,type:"buzzer",q:"What does the Breusch-Pagan test detect?",a:"Heteroskedasticity — tests whether error variance is related to the values of the independent variables"},

// ══ NEW: POLICY — MARKET FAILURE ══
{id:"mf1",cat:"Resource/Policy",pts:5,type:"buzzer",q:"Name the four main types of market failure.",a:"Externalities, public goods, information asymmetry, and market power (monopoly)"},
{id:"mf2",cat:"Resource/Policy",pts:10,type:"mc",q:"A negative externality causes the market to produce:",a:"C",options:["Too little output","The efficient quantity","Too much output","Zero output"]},
{id:"mf3",cat:"Resource/Policy",pts:10,type:"buzzer",q:"A positive externality causes the market to produce:",a:"Too little — the social benefit exceeds the private benefit, so the market undersupplies"},
{id:"mf4",cat:"Resource/Policy",pts:15,type:"buzzer",q:"Give a real-world example of a negative externality.",a:"Any of: factory pollution, secondhand smoke, traffic congestion, pesticide runoff"},
{id:"mf5",cat:"Resource/Policy",pts:15,type:"buzzer",q:"Give a real-world example of a positive externality.",a:"Any of: education, vaccination, R&D/technology spillovers, beekeeping near orchards"},
{id:"mf6",cat:"Resource/Policy",pts:20,type:"mc",q:"Information asymmetry occurs when:",a:"B",options:["Prices are too high","One party has more information than the other","Markets produce too much","Government sets wrong tax rates"]},
{id:"mf7",cat:"Resource/Policy",pts:15,type:"buzzer",q:"Akerlof's 'market for lemons' is a classic example of what type of market failure?",a:"Information asymmetry (adverse selection) — sellers know car quality; buyers don't"},
{id:"mf8",cat:"Resource/Policy",pts:10,type:"mc",q:"To correct a negative externality, government can:",a:"D",options:["Subsidize the good","Do nothing","Mandate more production","Tax the good (Pigovian tax)"]},
{id:"mf9",cat:"Resource/Policy",pts:20,type:"buzzer",q:"To correct a positive externality, government can:",a:"Subsidize the good or activity to bring private production up to the socially efficient level"},
{id:"mf10",cat:"Resource/Policy",pts:15,type:"mc",q:"Which policy tool sets a hard limit on total pollution and lets firms trade permits?",a:"B",options:["Pigovian tax","Cap-and-trade","Command-and-control","Subsidy"]},
{id:"mf11",cat:"Resource/Policy",pts:20,type:"buzzer",q:"What is the key difference between command-and-control regulation and market-based environmental policy?",a:"Command-and-control mandates specific behaviors or limits; market-based tools (taxes, cap-and-trade) use price signals and allow firms to find the lowest-cost way to reduce pollution"},
{id:"mf12",cat:"Resource/Policy",pts:10,type:"buzzer",q:"Marginal social cost (MSC) equals what when there is a negative externality?",a:"Marginal private cost (MPC) plus marginal external cost (MEC)"},

{id:"fsma1",cat:"Resource/Policy",pts:10,type:"buzzer",q:"What does FSMA stand for?",a:"Food Safety Modernization Act"},
{id:"fsma2",cat:"Resource/Policy",pts:10,type:"buzzer",q:"What year was FSMA signed into law, and by whom?",a:"2011, by President Obama (January 4, 2011)"},
{id:"fsma3",cat:"Resource/Policy",pts:15,type:"mc",q:"FSMA shifted the FDA's focus from ________ food safety problems to ________ them.",a:"B",options:["Preventing; responding to","Responding to; preventing","Ignoring; studying","Subsidizing; taxing"]},
{id:"fsma4",cat:"Resource/Policy",pts:15,type:"buzzer",q:"Which federal agency is primarily responsible for enforcing FSMA?",a:"The FDA (Food and Drug Administration)"},

{id:"fsma6",cat:"Resource/Policy",pts:15,type:"buzzer",q:"What is the FSMA's Produce Safety Rule designed to do?",a:"Set science-based minimum standards for growing, harvesting, packing, and holding produce for human consumption"},

const getTopic=(q={})=>{
  if(q.topic)return q.topic;
  const id=q.id||q.qid||"",cat=q.cat||"",t=((q.q||"")+" "+(q.a||"")).toLowerCase();
  const fromId=topicFromId(id,cat); if(fromId!==cat&&fromId!=="Uncategorized")return fromId;
  if(cat==="Microeconomics"){
    if(/elastic|midpoint|total revenue|cross-price|income elasticity|unit elastic|inelastic/.test(t))return "Elasticity";
    if(/cost|avc|atc|afc|marginal cost|shutdown|shut-down|tfc|tvc|mc of/.test(t))return "Cost curves";
    if(/monopol|oligop|cartel|duopoly|competition|chamberlin|firm maximizes|profit/.test(t))return "Market structures";
    if(/mrs|transitivity|inferior|giffen|substitution|consumer|opportunity cost|complements|substitutes/.test(t))return "Consumer theory";
    if(/production function|input|output|leontief|cobb|product/.test(t))return "Production";
    if(/demand|supply|surplus|shortage|price ceiling|quantity demanded/.test(t))return "Supply & demand";
    return "Micro foundations";
  }
  if(cat==="Macroeconomics"){
    if(/gdp|gnp|deflator|per capita|national income|open economy|c\+i\+g/.test(t))return "GDP & national income";
    if(/unemployment|labor force|job|employed|frictional|structural|cyclical|seasonal/.test(t))return "Unemployment";
    if(/inflation|cpi|price level|cost-push|demand-pull/.test(t))return "Inflation";
    if(/fed|money|m1|reserve|bank|discount rate|federal funds|prime rate|interest/.test(t))return "Money, banking & rates";
    if(/fiscal|tax|government spending|mpc|mps|multiplier|aggregate demand|ad/.test(t))return "Fiscal policy & multipliers";
    return "Business cycles & growth";
  }
  if(cat==="Agribusiness/Finance"){
    if(/balance sheet|income statement|accounts|asset|liabil|equity|ratio|cash ratio|common-size|receivable|inventory|dividends|retained earnings/.test(t))return "Accounting & ratios";
    if(/npv|irr|payback|profitability|capital budgeting|cash flow|sunk|salvage/.test(t))return "Capital budgeting";
    if(/bank|loan|fdic|credit|five cs|default|collateral|character/.test(t))return "Banking & credit";
    if(/option|forward|futures|stock|bond|ipo|secondary|primary|market|securities|shares/.test(t))return "Markets & instruments";
    return "Finance basics";
  }
  if(cat==="Resource/Policy"){
    if(/externality|pigovian|marginal damage|social cost|spillover/.test(t))return "Externalities";
    if(/public good|free rider|rival|club|common|tragedy/.test(t))return "Public/common goods";
    if(/coase|property rights|transaction costs|bargaining/.test(t))return "Property rights & Coase";
    if(/farm bill|snap|crp|conservation|crop insurance|usda/.test(t))return "Farm Bill & ag policy";
    if(/regulation|deregulation|tax|subsidy|permit|cap-and-trade|price ceiling/.test(t))return "Policy tools & regulation";
    return "Resource policy basics";
  }
  if(cat==="Quantitative"){
    if(/regression|dummy|panel|forecast|type i|type ii|alpha|mean|median|mode|iqr|skew/.test(t))return "Stats, regression & data";
    if(/elastic|revenue|price.*quantity|cross-price/.test(t))return "Elasticity calculations";
    if(/qd|qs|equilibrium|demand:|supply:/.test(t))return "Supply/demand equations";
    if(/gdp|mpc|mps|multiplier|inflation|money supply|velocity|cpi/.test(t))return "Macro math";
    if(/derivative|marginal|mr|mc|tc|atc|returns to scale|production|k\^|l\^|mpl|mpk/.test(t))return "Cost/production equations";
    return "Quantitative basics";
  }
  if(cat==="Marketing"){
    if(/segmentation|psychographic|demographic|geographic|target/.test(t))return "Segmentation & targeting";
    if(/brand|product|packaging|line|mix|extension|identity|service/.test(t))return "Product & branding";
    if(/price|pricing|markup|skimming|penetration|reference|zone|3\/10/.test(t))return "Pricing";
    if(/promotion|advertising|personal selling|public relations|pull|communications/.test(t))return "Promotion";
    if(/distribution|channel|captain|supply chain|selective|exclusive|intensive/.test(t))return "Distribution";
    return "Marketing basics";
  }
  if(cat==="Management"){
    if(/planning|organizing|controlling|directing|management function/.test(t))return "Management functions";
    if(/hr|employee|job|motivation|maslow|herzberg|mcgregor|evaluation|enrichment|rotation|enlargement/.test(t))return "HR & motivation";
    if(/leadership|power|authority|unity of command|centralization|span|departmental/.test(t))return "Leadership & structure";
    if(/decision|satisficing|heuristic|bias|escalation/.test(t))return "Decision-making";
    if(/quality|kaizen|tqm|six sigma|benchmark|standard/.test(t))return "Quality & operations";
    return "Management basics";
  }
  if(cat==="Potpourri"){
    if(/smith|keynes|friedman|marx|ricardo|hayek|malthus|nash|schumpeter|wealth of nations|das kapital|serfdom|creative destruction|invisible hand/.test(t))return "Famous economists";
    if(/peanut|cotton|nestlé|kiwi|potato|radarange|jumpman|louvre|white house/.test(t))return "General/ag trivia";
    if(/arbitrage|fiat|bear market|market capitalization|backwardation|bubble|price-fixing|laissez-faire|comparative advantage/.test(t))return "Economic vocabulary";
    if(/haiti|remittance|migrant|gdp|country|trade|closed economy/.test(t))return "International/development";
    return "Potpourri";
  }
  return cat||"Uncategorized";
};

const FACT_DECKS=[
{
  id:"economists",
  label:"Famous Economists",
  emoji:"🎓",
  color:"#7c3aed",
  cards:[
    {term:"Adam Smith",def:"Father of modern economics. Wrote The Wealth of Nations (1776). Famous for the 'invisible hand' — self-interest unintentionally benefits society — and the concept of absolute advantage."},
    {term:"John Maynard Keynes",def:"Argued government should increase spending (deficit spending) during recessions to stimulate aggregate demand. 'In the long run, we are all dead.' Associated with the paradox of thrift."},
    {term:"Milton Friedman",def:"Monetarist. 'Inflation is always and everywhere a monetary phenomenon.' Advocated a steady k-percent money supply growth rule. Developed the permanent income hypothesis. Chicago School."},
    {term:"Karl Marx",def:"Wrote Das Kapital and The Communist Manifesto. Labor theory of value. Predicted capitalism would collapse through workers' revolution and be replaced by communism. 'From each according to his ability, to each according to his needs.'"},
    {term:"David Ricardo",def:"Developed the theory of comparative advantage in international trade. 'Iron law of wages' — wages trend toward the minimum needed to sustain workers."},
    {term:"Friedrich Hayek",def:"Austrian School. The Road to Serfdom argued government planning leads to loss of individual freedom. Believed free markets coordinate information better than any central planner. Won Nobel Prize 1974."},
    {term:"Thomas Malthus",def:"Predicted population grows geometrically (exponentially) while food supply grows arithmetically (linearly), leading to famine. The 'Malthusian Trap.'"},
    {term:"John Nash",def:"Mathematician who developed game theory concepts including Nash Equilibrium — a situation where no player benefits from unilaterally changing strategy."},
    {term:"Joseph Schumpeter",def:"Coined 'creative destruction' — innovation by entrepreneurs destroys old industries while creating new ones. Saw capitalism as inherently dynamic and evolutionary."},
    {term:"Arthur Pigou",def:"Developed the concept of the Pigovian tax — a tax equal to marginal external cost, correcting a negative externality by making the firm internalize the social cost."},
    {term:"George Akerlof",def:"'Market for Lemons' — classic example of information asymmetry and adverse selection. When sellers know quality and buyers don't, low-quality goods drive out high-quality ones."},
    {term:"Ronald Coase",def:"Coase theorem: if property rights are well-defined and transaction costs are low, private bargaining can solve externality problems without government intervention."},
    {term:"Nash Equilibrium",def:"A set of strategies where no player can improve their outcome by changing only their own strategy, given everyone else's strategy stays the same."},
    {term:"Invisible Hand (Smith)",def:"The idea that individuals pursuing their own self-interest in free markets unintentionally promote the economic well-being of society as a whole."},
    {term:"Creative Destruction (Schumpeter)",def:"The process by which innovation and entrepreneurship continuously destroy old economic structures and replace them with new, more productive ones."},
    {term:"Paradox of Thrift (Keynes)",def:"When everyone saves more simultaneously, aggregate demand falls, output drops, and the economy may end up worse off — even though saving is individually rational."},
    {term:"Comparative Advantage (Ricardo)",def:"A country (or person) has comparative advantage in producing a good if its opportunity cost of producing that good is lower than others'. Trade benefits both parties even if one is absolutely better at everything."},
    {term:"Permanent Income Hypothesis (Friedman)",def:"Consumers base spending on their expected long-run average income, not current income — so temporary tax cuts have smaller effects on consumption than permanent ones."},

{

    {term:"Cyclical unemployment",def:"Unemployment caused by a recession — insufficient aggregate demand. Falls when the economy expands. The main target of fiscal and monetary stimulus."},

    {term:"Natural rate of unemployment",def:"The unemployment rate when the economy is at full employment — includes frictional and structural unemployment, but NOT cyclical. Full employment does NOT mean zero unemployment."},
    {term:"Unemployment rate formula",def:"(Number unemployed ÷ Labor force) × 100. The labor force = employed + actively looking for work. Does NOT include discouraged workers or those not seeking work."},
    {term:"Discouraged workers",def:"People who have stopped actively looking for work because they believe no jobs are available. NOT counted in the official unemployment rate — understates true joblessness."},
    {term:"Labor force participation rate",def:"(Labor force ÷ Working-age population) × 100. Measures what share of adults are working or actively job-hunting."},

{
  id:"macro_concepts",
  label:"Macro: Core Concepts",
  emoji:"📊",
  color:"#0284c7",
  cards:[
    {term:"GDP (Gross Domestic Product)",def:"Market value of all final goods and services produced within a country's borders in a given year. Expenditure approach: GDP = C + I + G + NX."},
    {term:"GNP vs. GDP",def:"GDP = produced within a country (location-based). GNP = produced by a country's citizens anywhere in the world (ownership-based). US GNP ≈ GDP; differs more for small open economies."},
    {term:"MPC (Marginal Propensity to Consume)",def:"The fraction of each additional dollar of income spent on consumption. MPC + MPS = 1. If MPC = 0.8, you spend 80¢ of every extra dollar."},
    {term:"Spending multiplier",def:"1 ÷ (1 − MPC) or 1 ÷ MPS. An initial change in spending ripples through the economy. If MPC = 0.75, multiplier = 4; a $100B spending increase → $400B GDP increase."},
    {term:"Tax multiplier",def:"−MPC ÷ (1 − MPC). Smaller than the spending multiplier because some of a tax cut is saved. If MPC = 0.75, tax multiplier = −3; a $100B tax CUT → +$300B GDP."},
    {term:"Aggregate Demand (AD)",def:"Total spending on goods and services at every price level: C + I + G + NX. Shifts right with income increases, lower interest rates, government spending, or export growth."},
    {term:"Aggregate Supply (SRAS)",def:"Total output producers supply at each price level in the short run. Shifts right with lower input costs, improved technology, or positive supply shocks."},
    {term:"Cost-push inflation",def:"Rising input costs (e.g., oil prices) shift SRAS left, raising the price level and reducing output. Stagflation = inflation + recession simultaneously."},
    {term:"Demand-pull inflation",def:"Excess aggregate demand pulls prices up — 'too much money chasing too few goods.' AD shifts right faster than SRAS can keep up."},
    {term:"Recessionary gap",def:"When actual GDP < potential GDP. Unemployment above the natural rate. Closed by expansionary fiscal or monetary policy."},
    {term:"Inflationary gap",def:"When actual GDP > potential GDP. Economy is overheating. Closed by contractionary fiscal or monetary policy."},
    {term:"M1 money supply",def:"Most liquid money: coins, paper currency, and checkable (demand) deposits. Does NOT include savings accounts, CDs, or bonds."},
    {term:"Money multiplier",def:"1 ÷ reserve ratio. If reserve requirement is 10%, $1,000 in new reserves can support up to $10,000 in new deposits through repeated lending."},
    {term:"Fiscal policy",def:"Using government spending and taxation to influence the economy. Expansionary: increase spending or cut taxes. Contractionary: cut spending or raise taxes."},
    {term:"Monetary policy",def:"Fed actions to control money supply and interest rates. Expansionary (loose): lower rates, buy bonds. Contractionary (tight): raise rates, sell bonds."},
  ]
},
{
  id:"micro_core",
  label:"Micro: Core Concepts",
  emoji:"📈",
  color:"#2563eb",
  cards:[
    {term:"Law of demand",def:"As price rises, quantity demanded falls (inverse relationship), ceteris paribus. Demand curve slopes downward."},
    {term:"Law of supply",def:"As price rises, quantity supplied rises (direct relationship), ceteris paribus. Supply curve slopes upward."},
    {term:"Equilibrium",def:"Where quantity demanded = quantity supplied. Set Qd = Qs and solve. At equilibrium price, no surplus or shortage."},
    {term:"Consumer surplus",def:"The difference between what consumers are willing to pay (demand curve) and what they actually pay (market price). Area above price, below demand curve."},
    {term:"Producer surplus",def:"The difference between what producers receive (market price) and their minimum acceptable price (supply curve). Area below price, above supply curve."},
    {term:"Price elasticity of demand",def:"% change in Qd ÷ % change in P. |Ed| > 1 = elastic (TR falls when P rises). |Ed| < 1 = inelastic (TR rises when P rises). |Ed| = 1 = unit elastic (TR unchanged)."},
    {term:"Profit maximization rule",def:"All firms maximize profit where MR = MC. For perfect competitors: P = MR = MC. For monopolists: find where MR = MC, then read price off the demand curve."},
    {term:"Shutdown rule",def:"A firm should shut down in the short run if P < AVC (revenue doesn't cover variable costs). Should stay open if P > AVC even if it's making a loss."},
    {term:"Long-run competitive equilibrium",def:"P = minimum ATC. Zero economic profit. Firms earn only normal profit. Free entry/exit drives this result."},
    {term:"Marginal Revenue (MR) for linear demand",def:"For P = a − bQ, MR = a − 2bQ. Same vertical intercept, twice the slope. MR always lies below the demand curve for a monopolist."},
    {term:"ATC, AVC, AFC relationship",def:"ATC = AVC + AFC. AFC = TFC ÷ Q (always declining). MC crosses both AVC and ATC at their minimum points."},
    {term:"Economies of scale",def:"Long-run ATC falls as output increases. Diseconomies of scale: LRATC rises. Constant returns to scale: LRATC flat."},
    {term:"Deadweight loss",def:"The loss of total surplus (consumer + producer) from a market distortion — tax, price control, or monopoly. Represents mutually beneficial trades that don't happen."},
    {term:"Price discrimination",def:"Charging different prices to different customers for the same good based on willingness to pay. Requires market power, ability to segment, and no resale between groups."},
  ]
},
{
  id:"regression",
  label:"Quantitative: Regression & Stats",
  emoji:"📐",
  color:"#d97706",
  cards:[
    {term:"OLS (Ordinary Least Squares)",def:"The standard method for estimating regression coefficients. Minimizes the sum of squared residuals. Gives BLUE (Best Linear Unbiased Estimator) when Gauss-Markov assumptions hold."},
    {term:"β₀ (intercept)",def:"The predicted value of Y when all X variables = 0. The 'constant' in a regression equation. Sometimes has no meaningful real-world interpretation."},
    {term:"β₁ (slope coefficient)",def:"The change in the dependent variable (Y) for a one-unit increase in the independent variable (X₁), holding all other variables constant (ceteris paribus)."},
    {term:"R² (R-squared)",def:"Proportion of variation in Y explained by the model. Ranges 0–1. R² = 0.72 means 72% of variation in Y is explained by the X variables. Does NOT prove causation."},
    {term:"Dummy variable",def:"A binary variable taking values 0 or 1 to represent a categorical characteristic (e.g., male/female, irrigated/not). Coefficient measures the group difference, all else equal."},
    {term:"Heteroskedasticity",def:"Error variance is not constant across observations (violates OLS assumption). OLS estimates remain unbiased but are no longer efficient. Standard errors are wrong → unreliable t-tests. Fix: robust standard errors or WLS."},
    {term:"Autocorrelation (serial correlation)",def:"Regression errors are correlated over time — common in time-series data. OLS estimates are unbiased but inefficient; standard errors understated. Detected with Durbin-Watson test (value near 2 = no autocorrelation)."},
    {term:"Multicollinearity",def:"Independent variables are highly correlated with each other. OLS estimates are still unbiased but imprecise — standard errors inflate, making it hard to isolate individual effects. Detected with VIF (Variance Inflation Factor)."},
    {term:"Omitted variable bias",def:"When a variable that affects Y and is correlated with included X variables is left out. Causes OLS estimates to be biased and inconsistent — the most serious regression problem."},
    {term:"Type I error (α)",def:"Rejecting a null hypothesis that is actually true — a 'false positive.' The probability of Type I error is α (significance level). Typically set at 0.05 (5%)."},
    {term:"Type II error (β)",def:"Failing to reject a null hypothesis that is actually false — a 'false negative.' Probability = β. Power of a test = 1 − β (probability of correctly detecting a true effect)."},
    {term:"p-value",def:"The probability of observing a test statistic as extreme as the one calculated, if H₀ is true. p < α → reject H₀. p = 0.03 with α = 0.05 → statistically significant."},
    {term:"Durbin-Watson statistic",def:"Tests for first-order autocorrelation in OLS residuals. Values range 0–4. Near 2 = no autocorrelation. Near 0 = positive autocorrelation. Near 4 = negative autocorrelation."},
    {term:"VIF (Variance Inflation Factor)",def:"Measures how much the variance of a coefficient is inflated due to multicollinearity. VIF > 10 (some say > 5) signals a serious multicollinearity problem."},
    {term:"Breusch-Pagan test",def:"Tests for heteroskedasticity. Regresses squared residuals on the X variables. A significant result means error variance is not constant — heteroskedasticity is present."},
    {term:"Panel data",def:"Data with both cross-sectional units (individuals, firms, counties) and time periods. Allows fixed effects or random effects models to control for unobserved unit-level heterogeneity."},
  ]
},
{
  id:"market_failure",
  label:"Policy: Market Failure & Externalities",
  emoji:"⚖️",
  color:"#7c3aed",
  cards:[
    {term:"Market failure",def:"When free markets fail to allocate resources efficiently. The four main types: (1) externalities, (2) public goods, (3) information asymmetry, (4) market power (monopoly)."},
    {term:"Negative externality",def:"A cost imposed on a third party not involved in the transaction. Example: factory pollution, secondhand smoke, pesticide runoff. Market overproduces — MSC > MPC, so the social optimum is less output than the market provides."},
    {term:"Positive externality",def:"A benefit conferred on a third party not involved in the transaction. Example: education, vaccination, R&D spillovers, beekeeping. Market underproduces — MSB > MPB, so the social optimum is more output than the market provides."},
    {term:"Pigovian tax",def:"A tax set equal to the marginal external cost of a negative externality. Forces firms to internalize the social cost. Named after Arthur Pigou. Corrects the market to produce the socially efficient quantity."},
    {term:"Pigovian subsidy",def:"A subsidy equal to the marginal external benefit of a positive externality. Incentivizes more production to reach the socially efficient quantity. Example: subsidizing vaccines or education."},
    {term:"Cap-and-trade",def:"Government sets a cap (limit) on total emissions. Firms receive or buy permits. Firms that reduce pollution cheaply can sell permits to those for whom reduction is costly. Achieves the cap at lowest total cost."},
    {term:"Command-and-control vs. market-based",def:"C&C: mandates specific behaviors or technology (e.g., 'no more than X tons of emissions'). Market-based (taxes, cap-and-trade): use price signals — firms find the cheapest way to comply. Market-based is generally more efficient."},
    {term:"Coase theorem",def:"If property rights are well-defined and transaction costs are low, private parties can bargain to an efficient outcome without government intervention, regardless of who initially holds the rights."},
    {term:"Public good",def:"Non-rival (one person's use doesn't reduce availability for others) AND non-excludable (can't prevent non-payers from using it). Classic examples: national defense, lighthouses, fireworks. Subject to free-rider problem."},
    {term:"Free-rider problem",def:"When people can benefit from a good without paying for it, they have no incentive to pay. Markets underprovide public goods as a result. Justifies government provision."},
    {term:"Tragedy of the Commons",def:"Commonly owned resources get overused because each individual has incentive to use as much as possible before others do, even though collective overuse destroys the resource. Example: overfishing, overgrazing."},
    {term:"Information asymmetry",def:"One party to a transaction has more or better information than the other. Can cause adverse selection (before transaction) or moral hazard (after transaction). Akerlof's 'market for lemons' is the classic example."},
    {term:"Marginal social cost (MSC)",def:"MSC = Marginal Private Cost (MPC) + Marginal External Cost (MEC). At the efficient output, price = MSC. With a negative externality, the unregulated market sets P = MPC, producing too much."},
  ]
},
{
  id:"farm_policy",
  label:"Policy: Farm Bill, FSMA & Rescue Programs",

  color:"#059669",

    {term:"Farm Bill Nutrition Title (SNAP)",def:"Largest spending title in the Farm Bill. SNAP (Supplemental Nutrition Assistance Program) — formerly food stamps — provides food assistance to low-income households. Administered by USDA."},
    {term:"ARC — Agricultural Risk Coverage",def:"Farm Bill commodity program. Pays farmers when actual crop revenue falls below a revenue guarantee (based on Olympic average prices and yields). County-level (ARC-CO) or individual farm (ARC-IC)."},

    {term:"FSA — Farm Service Agency",def:"USDA agency that administers most Farm Bill commodity programs (ARC, PLC, CRP, disaster assistance). Farmers sign up at local FSA offices."},
    {term:"DMC — Dairy Margin Coverage",def:"Farm Bill program for dairy producers. Pays when the margin between milk price and feed cost falls below a chosen coverage level. Protects against low milk prices combined with high feed costs."},

    {term:"FSMA — FDA jurisdiction",def:"FSMA is enforced by the FDA (not USDA). FDA regulates most food except meat, poultry, and egg products (those are USDA/FSIS). FSMA applies to domestic and imported food."},

    {term:"One Big Beautiful Bill Act (OBBBA)",def:"Signed July 4, 2025 by President Trump. Reconciliation bill that included major agricultural provisions: extended ARC/PLC/DMC through 2031, raised reference prices 12–15%, added $65.6B in ag spending over 10 years."},

    {term:"OBBBA — New base acre allocation",def:"One-time voluntary opportunity for farmers to reallocate base acres beginning with the 2026 crop year. New base-acre allocations capped at 30 million acres nationally."},
    {term:"MFP — Market Facilitation Program",def:"USDA direct payment program providing aid to farmers hurt by retaliatory tariffs during U.S.-China trade war. MFP 2018: $12B. MFP 2019: $14.5B. Administered by FSA under the Commodity Credit Corporation (CCC) Charter Act."},

// ═══ FACT CARDS COMPONENT ═══
function FactCards(){
const[deck,setDeck]=useState(null);
const[ix,setIx]=useState(0);
const[flipped,setFlipped]=useState(false);
const[known,setKnown]=useState(()=>ld("factcards",{}));
useEffect(()=>sv("factcards",known),[known]);

if(!deck){
  return html`<div class="fu">
  <section class="hero-card" style=${{marginBottom:18}}>
    <div class="hero-inner" style=${{gridTemplateColumns:"1fr"}}>
      <div>
        <div class="kicker">📖 Fact Cards</div>
        <h1 class="hero-title" style=${{fontSize:32}}>Study by topic. Know every term cold.</h1>
        <p class="hero-copy">Tap a deck to start. Flip each card, mark it known or still learning. Famous economists stay separate — their own deck.</p>
      </div>
    </div>
  </section>
  <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
  ${FACT_DECKS.map(d=>{
    const total=d.cards.length;
    const doneCount=d.cards.filter(c=>known[d.id+"_"+c.term]).length;
    return html`<button onClick=${()=>{setDeck(d);setIx(0);setFlipped(false);}} style=${{background:"#ffffff",border:"2px solid "+d.color+"33",borderRadius:20,padding:"18px 20px",textAlign:"left",cursor:"pointer",position:"relative",overflow:"hidden",boxShadow:"0 8px 20px rgba(15,23,42,.07)"}}>
      <div style=${{position:"absolute",left:0,top:0,bottom:0,width:5,background:d.color,borderRadius:"20px 0 0 20px"}}/>
      <div style=${{fontSize:28,marginBottom:8}}>${d.emoji}</div>
      <div style=${{fontSize:17,fontWeight:900,color:"#0f172a",marginBottom:4}}>${d.label}</div>
      <div style=${{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
        <div style=${{flex:1,height:4,background:"#e2e8f0",borderRadius:2}}>
          <div style=${{width:(doneCount/total*100)+"%",height:"100%",background:d.color,borderRadius:2}}/>
        </div>
        <span style=${{fontSize:13,fontWeight:700,color:d.color}}>${doneCount}/${total}</span>
      </div>
    </button>`;
  })}
  </div></div>`;
}

const cards=deck.cards;
const card=cards[ix];
const cardKey=deck.id+"_"+card.term;
const isKnown=known[cardKey];
const progress=cards.filter(c=>known[deck.id+"_"+c.term]).length;

const next=()=>{setIx(i=>(i+1)%cards.length);setFlipped(false);};
const prev=()=>{setIx(i=>(i-1+cards.length)%cards.length);setFlipped(false);};
const markKnown=()=>{setKnown(k=>({...k,[cardKey]:true}));next();};
const markStudy=()=>{setKnown(k=>({...k,[cardKey]:false}));next();};

return html`<div class="fu">
<div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
  <button onClick=${()=>setDeck(null)} class="secondary-btn">← All Decks</button>
  <span style=${{fontSize:16,fontWeight:900,color:"#334155"}}>${deck.emoji} ${deck.label}</span>
  <span class="m" style=${{fontSize:14,color:"#64748b",marginLeft:"auto"}}>${progress}/${cards.length} known</span>
</div>

<div style=${{width:"100%",background:"#e2e8f0",height:4,borderRadius:2,marginBottom:18}}>
  <div style=${{width:(progress/cards.length*100)+"%",height:"100%",background:deck.color,borderRadius:2,transition:"width .3s"}}/>
</div>

<div onClick=${()=>setFlipped(f=>!f)} style=${{
  background:flipped?"#1a1040":"#ffffff",
  border:"2px solid "+(flipped?deck.color+"88":deck.color+"33"),
  borderRadius:20,padding:"32px 28px",minHeight:220,
  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
  cursor:"pointer",textAlign:"center",transition:"all .25s",
  boxShadow:"0 12px 30px rgba(15,23,42,.09)",marginBottom:16
}}>
  ${!flipped?html`<div>
    <div style=${{fontSize:12,fontWeight:900,color:deck.color,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>TERM</div>
    <div style=${{fontSize:24,fontWeight:900,color:"#0f172a",lineHeight:1.2,marginBottom:12}}>${card.term}</div>
    <div style=${{fontSize:14,color:"#94a3b8",marginTop:8}}>Tap to reveal definition</div>
  </div>`:html`<div>
    <div style=${{fontSize:12,fontWeight:900,color:deck.color,letterSpacing:".1em",textTransform:"uppercase",marginBottom:12}}>DEFINITION</div>
    <div style=${{fontSize:16,fontWeight:600,color:"#e2e8f0",lineHeight:1.65,maxWidth:520}}>${card.def}</div>
  </div>`}
</div>

${flipped&&html`<div class="fu" style=${{display:"flex",gap:10,marginBottom:14}}>
  <button onClick=${markStudy} style=${{flex:1,padding:13,borderRadius:12,fontSize:16,fontWeight:700,background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"}}>Still learning</button>
  <button onClick=${markKnown} style=${{flex:1,padding:13,borderRadius:12,fontSize:16,fontWeight:700,background:"#f0fdf4",color:"#16a34a",border:"1px solid #bbf7d0"}}>Got it ✓</button>
</div>`}

<div style=${{display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
  <button onClick=${prev} style=${{background:"#eff6ff",color:"#2563eb",padding:"10px 18px",borderRadius:10,fontWeight:700,fontSize:16,border:"1px solid #bfdbfe"}}>← Prev</button>
  <span class="m" style=${{fontSize:16,color:"#64748b",minWidth:60,textAlign:"center"}}>${ix+1} / ${cards.length}</span>
  <button onClick=${next} style=${{background:"#eff6ff",color:"#2563eb",padding:"10px 18px",borderRadius:10,fontWeight:700,fontSize:16,border:"1px solid #bfdbfe"}}>Next →</button>
</div>

${progress===cards.length&&html`<div class="fu" style=${{background:"#f0fdf4",border:"2px solid #86efac",borderRadius:14,padding:16,textAlign:"center",marginTop:14}}>
  <div style=${{fontSize:28,marginBottom:4}}>🎉</div>
  <div style=${{fontSize:17,fontWeight:900,color:"#166534"}}>Deck complete! All ${cards.length} cards marked known.</div>
  <button onClick=${()=>{setKnown(k=>{const n={...k};cards.forEach(c=>delete n[deck.id+"_"+c.term]);return n;});setIx(0);setFlipped(false);}} style=${{marginTop:10,background:"#16a34a",color:"#fff",padding:"10px 20px",borderRadius:8,fontWeight:700,fontSize:15}}>Reset & Drill Again</button>
</div>`}
</div>`;
}

function App(){
const[tab,setTab]=useState("today");
const[coach,setCoach]=useState(false);
const[pw,setPw]=useState("");
const[pwErr,setPwErr]=useState(false);
const[players,setPlayers]=useState(["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6","Player 7","Player 8"]);
const[trainQs,setTrainQs]=useState([...TRAIN]);
const[assessQs,setAssessQs]=useState([...ASSESS]);
const[named,setNamed]=useState([]);
const[hist,setHist]=useState([]);
const[flash,setFlash]=useState(()=>ld("flash",{}));
const[ready,setReady]=useState(false);

useEffect(()=>{
const r={players:db.ref("players"),training:db.ref("training"),assess:db.ref("assess"),named:db.ref("named"),hist:db.ref("hist")};

// Migration: check localStorage for existing data and push to Firebase if Firebase is empty
const localPlayers=ld("players",null);
const localHist=ld("hist",null);
const localTraining=ld("training",null);
const localAssess=ld("assess",null);
const localNamed=ld("named",null);

r.players.on("value",s=>{const v=s.val();if(v){const a=Array.isArray(v)?v:Object.values(v);if(a.length)setPlayers(a);}});
r.training.on("value",s=>{const v=s.val();if(v){const a=Array.isArray(v)?v:Object.values(v);if(a.length){const ids=new Set(a.map(q=>q.id));setTrainQs([...a,...TRAIN.filter(q=>!ids.has(q.id))]);}}});
r.assess.on("value",s=>{const v=s.val();if(v){const a=Array.isArray(v)?v:Object.values(v);if(a.length){const ids=new Set(a.map(q=>q.id));setAssessQs([...a,...ASSESS.filter(q=>!ids.has(q.id))]);}}});
r.named.on("value",s=>{const v=s.val();if(v){const a=Array.isArray(v)?v:Object.values(v);
  // Firebase converts nested arrays to objects — normalize questions arrays back
  const normalized=a.map(sess=>({...sess,questions:Array.isArray(sess.questions)?sess.questions:Object.values(sess.questions||{})}));
  setNamed(normalized);}});
r.hist.on("value",s=>{const v=s.val();if(v){const a=Array.isArray(v)?v:Object.values(v);setHist(a);}});

// Seed Firebase: prefer localStorage data over defaults
db.ref("players").once("value",s=>{
  if(!s.val()){
    const p=localPlayers&&localPlayers.length?localPlayers:["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6","Player 7","Player 8"];
    fbSet("players",p);
  }
});
db.ref("hist").once("value",s=>{
  if(!s.val()&&localHist&&localHist.length){
    fbSet("hist",localHist);
  }
});
db.ref("training").once("value",s=>{
  if(!s.val()){
    const t=localTraining&&localTraining.length?localTraining:TRAIN;
    fbSet("training",t);
  }
});
db.ref("assess").once("value",s=>{
  if(!s.val()){
    const a=localAssess&&localAssess.length?localAssess:ASSESS;
    fbSet("assess",a);
  }
});
db.ref("named").once("value",s=>{if(!s.val())fbSet("named",SESSIONS);});
// Session version check: if Firebase has an older session set, push the new one.
// Bump SESSIONS_VERSION whenever the SESSIONS array changes.
const SESSIONS_VERSION=3;
db.ref("sessionsVersion").once("value",s=>{
  if((s.val()||0)<SESSIONS_VERSION){
    fbSet("named",SESSIONS);
    fbSet("sessionsVersion",SESSIONS_VERSION);
  }
});
setReady(true);
return()=>Object.values(r).forEach(x=>x.off());
},[]);

useEffect(()=>sv("flash",flash),[flash]);

const sync=(path,setter)=>(fn)=>{const v=typeof fn==="function"?fn(path==="players"?players:path==="training"?trainQs:path==="assess"?assessQs:named):fn;setter(v);fbSet(path,v);};
const sP=sync("players",setPlayers);
const sT=sync("training",setTrainQs);
const sA=sync("assess",setAssessQs);
const sN=sync("named",setNamed);
const addH=(ev)=>{const entry={...ev,topic:ev.topic||getTopic(ev),ts:Date.now()};setHist(p=>[...p,entry]);db.ref("hist").push(entry).catch(e=>console.error(e));};
const addT=(q)=>{const nq={...q,id:"t"+Date.now()+"_"+Math.random().toString(36).slice(2,5)};setTrainQs(p=>{const n=[...p,nq];fbSet("training",n);return n;});};
const addAQ=(q)=>{const nq={...q,id:"a"+Date.now()+"_"+Math.random().toString(36).slice(2,5)};setAssessQs(p=>{const n=[...p,nq];fbSet("assess",n);return n;});};

const tabs=[
...(coach?[{id:"dash",l:"Coach",i:"📊"}]:[]),
{id:"today",l:"Today",i:"✅"},
{id:"practice",l:"Practice",i:"🎯"},
{id:"facts",l:"Fact Cards",i:"📖"},
{id:"team",l:"Team",i:"👥"},
...(coach?[{id:"build",l:"Build",i:"✏️"}]:[]),
...(!coach?[{id:"coach",l:"Coach",i:"🔒"}]:[{id:"coach",l:"Out",i:"🔓"}])
];

return html`<div className="app-shell">
<header className="app-header">
  <div className="brand-block">
    <div className="brand-mark">🏆</div>
    <div>
      <div className="brand-title">Quiz Bowl Trainer</div>
      <div className="brand-subtitle">Daily practice · team tracking · coach insight</div>
    </div>
  </div>
  <div className="header-meta">
    <span className="status-pill red">Wolfpack ready</span>
    <span className="status-pill">${players.length} players</span>
    <span className="status-pill">${(1200 + hist.length).toLocaleString()} reps logged</span>
  </div>
</header>

<div className="nav-wrap"><div className="nav-shell">
${tabs.map(t=>{const active=tab===t.id||(["train","flash","assess"].includes(tab)&&t.id==="practice");return html`<button key=${t.id} onClick=${()=>setTab(t.id)} className=${"nav-btn "+(active?"nav-btn-active":"")}>${t.i}<span>${t.l}</span></button>`})}
</div></div>
<main className="page-shell">
${tab==="today"&&html`<${Today} players=${players} hist=${hist} flash=${flash} setTab=${setTab} named=${named}/>`}
${tab==="practice"&&html`<${PracticeHome} trainQs=${trainQs} assessQs=${assessQs} named=${named} flash=${flash} setTab=${setTab}/>`}
${["train","flash","assess"].includes(tab)&&html`<button onClick=${()=>setTab("practice")} className="secondary-btn" style=${{marginBottom:12}}>← Practice menu</button>`}
${tab==="train"&&html`<${Train} qs=${trainQs} players=${players} addH=${addH}/>`}
${tab==="flash"&&html`<${Flash} qs=${trainQs} prog=${flash} setProg=${setFlash}/>`}
${tab==="assess"&&html`<${Assess} qs=${assessQs} players=${players} addH=${addH} named=${named}/>`}
${tab==="facts"&&html`<${FactCards}/>`}
${tab==="dash"&&coach&&html`<${CoachDash} players=${players} hist=${hist} trainQs=${trainQs} assessQs=${assessQs} named=${named}/>`}
${tab==="build"&&coach&&html`<${Build} addT=${addT} tQs=${trainQs} setT=${sT} aQs=${assessQs} setA=${sA} addAQ=${addAQ} named=${named} setN=${sN}/>`}
${tab==="team"&&html`<${Team} players=${players} setPlayers=${sP} hist=${hist}/>`}
${tab==="coach"&&!coach&&html`<div className="fu section-card" style=${{maxWidth:390,margin:"18px auto",textAlign:"center"}}>
<div style=${{fontSize:44,marginBottom:8}}>🔒</div>
<h2 className="m" style=${{fontSize:18,fontWeight:900,marginBottom:8}}>Coach Login</h2>
<p style=${{fontSize:15,color:"#64748b",marginBottom:16}}>Unlock assignments, the teach-next dashboard, and question builder.</p>
<input type="password" value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"){pw==="Timmydog28"?(setCoach(true),setTab("dash"),setPw("")):setPwErr(true)}}} placeholder="Password" className="inp m" style=${{textAlign:"center",marginBottom:10}}/>
${pwErr&&html`<p style=${{color:"#dc2626",fontSize:16,marginBottom:10,fontWeight:800}}>Wrong password</p>`}
<button onClick=${()=>pw==="Timmydog28"?(setCoach(true),setTab("dash"),setPw("")):setPwErr(true)} className="primary-cta" style=${{width:"100%",minWidth:0,padding:"13px 18px",fontSize:17}}>Unlock Dashboard</button>
</div>`}
${tab==="coach"&&coach&&html`<div className="fu section-card" style=${{maxWidth:390,margin:"18px auto",textAlign:"center"}}>
<div style=${{fontSize:44,marginBottom:8}}>🔓</div>
<h2 className="m" style=${{fontSize:18,fontWeight:900,marginBottom:10}}>Coach tools are unlocked</h2>
<button onClick=${()=>{setCoach(false);setTab("today")}} className="secondary-btn">Lock & Log Out</button>
</div>`}
</main></div>`;
}

// ═══ TODAY / PRACTICE HUB ═══
function Today({players,hist,flash,setTab,named}){
const today=dayKey(Date.now());
const weekCut=Date.now()-7*864e5;
const todayHist=hist.filter(h=>h.ts&&dayKey(h.ts)===today);
const weekHist=hist.filter(h=>(h.ts||0)>=weekCut);
const trainToday=todayHist.filter(h=>h.mode==="train").length;
const checkToday=todayHist.filter(h=>h.mode==="assess").length;
const acc=pct(todayHist.filter(h=>h.correct).length,todayHist.length);
const activeWeek=[...new Set(weekHist.map(h=>h.player).filter(Boolean))].length;
const flashMissed=Object.values(flash||{}).filter(v=>(v?.w||0)>(v?.r||0)).length;
const nextAssigned=named&&named.length?named[0]:null;
const doneTrain=trainToday>=20,doneCheck=checkToday>0;
const card=(title,sub,done,action,emoji,accent)=>html`<button onClick=${action} className="path-card" style=${{"--accent":accent}}>
  <div className="path-icon">${emoji}</div>
  <div style=${{flex:1,position:"relative"}}>
    <div className="path-title-row"><div className="path-title">${title}</div><span className=${"badge "+(done?"done":"")}>${done?"Complete":"Start"}</span></div>
    <p className="path-sub">${sub}</p>
  </div>
</button>`;
return html`<div className="fu">
<section className="hero-card">
  <div className="hero-inner">
    <div>
      <div className="kicker">Daily practice</div>
      <h1 className="hero-title">Train fast. Track progress. Know what to teach next.</h1>
      <p className="hero-copy">A simple daily rhythm for quiz bowl: get reps, review weak cards, and finish with a short check-in that gives the coach useful topic data.</p>
    </div>
    <div>
      <button onClick=${()=>setTab("train")} className="primary-cta">Start Today’s Practice →</button>
      <div className="cta-note">20 questions · flashcards · check-in</div>
    </div>
  </div>
</section>

<div className="metric-grid">
  <div className="metric-card"><div className="num m" style=${{color:"#2563eb"}}>${todayHist.length}</div><div className="label">questions today</div></div>
  <div className="metric-card"><div className="num m" style=${{color:todayHist.length?"#059669":"#94a3b8"}}>${todayHist.length?acc+"%":"—"}</div><div className="label">today’s accuracy</div></div>
  <div className="metric-card"><div className="num m" style=${{color:"#ea580c"}}>${activeWeek}/${players.length}</div><div className="label">active this week</div></div>
  <div className="metric-card"><div className="num m" style=${{color:"#7c3aed"}}>${flashMissed}</div><div className="label">cards needing review</div></div>
</div>

<div className="path-grid">
  ${card("Training Quiz",trainToday+"/20 questions logged today",doneTrain,()=>setTab("train"),"⚡","#2563eb")}
  ${card("Flashcards",flashMissed?flashMissed+" weak cards need review":"Review cards for speed and recall",false,()=>setTab("flash"),"🃏","#7c3aed")}
  ${card("Check-In",nextAssigned?nextAssigned.name:"Short assessment for coaching data",doneCheck,()=>setTab("assess"),"📝","#059669")}
</div>

<section className="section-card">
  <div className="section-header" style=${{marginBottom:0}}>
    <div><h2 className="section-title m">Practice menu</h2><p className="section-copy">Use this when you want a specific mode instead of the daily path.</p></div>
    <button onClick=${()=>setTab("practice")} className="secondary-btn">Open Practice Options</button>
  </div>
</section>
</div>`;
}

function PracticeHome({trainQs,assessQs,named,flash,setTab}){
const flashMissed=Object.values(flash||{}).filter(v=>(v?.w||0)>(v?.r||0)).length;
const tile=(emoji,title,sub,meta,action,accent)=>html`<button onClick=${action} className="practice-tile" style=${{"--accent":accent}}>
  <div className="practice-icon">${emoji}</div>
  <h3 className="practice-title">${title}</h3>
  <p className="practice-sub">${sub}</p>
  <span className="meta-chip">${meta}</span>
</button>`;
return html`<div className="fu">
  <div style=${{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:14,padding:"14px 18px",marginBottom:14,display:"flex",gap:12,alignItems:"flex-start"}}>
    <span style=${{fontSize:24}}>✨</span>
    <div>
      <div style=${{fontSize:16,fontWeight:900,color:"#92400e",marginBottom:3}}>83 new questions added for competition prep</div>
      <div style=${{fontSize:15,color:"#a16207",lineHeight:1.45}}>Equation drills (MR, TC, MC, supply & demand) · Regression & stats (heteroskedasticity, autocorrelation, dummy variables) · Fed current events (Warsh, Powell, Bessent) · Farm policy (Farm Bill, FSMA, OBBBA, MFP). New questions show a ✨ NEW badge. Check-In sessions 7A–8B are all new. Plus a new <b>Fact Cards</b> tab with 116 study cards.</div>
    </div>
  </div>
  <section className="section-card">
    <div className="section-header">
      <div><h2 className="section-title m">Practice Options</h2><p className="section-copy">Pick a mode. For most students, start with Training Quiz and then review Flashcards.</p></div>
      <button onClick=${()=>setTab("today")} className="secondary-btn">← Back to Today</button>
    </div>
    <div className="practice-grid">
      ${tile("⚡","Training Quiz","Timed buzzer-style questions. Best default for daily reps.",trainQs.length+" questions",()=>setTab("train"),"#2563eb")}
      ${tile("🃏","Flashcards","Review missed questions. Weak cards come back more often.",flashMissed+" weak cards",()=>setTab("flash"),"#7c3aed")}
      ${tile("📝","Check-In","A short assessment that creates coaching data by category and topic.",assessQs.length+" questions",()=>setTab("assess"),"#059669")}
      ${tile("📌","Assigned Sets",named.length?"Start a coach-built set from the Check-In screen.":"Coach-created sets will show here once added.",named.length+" sets",()=>setTab("assess"),"#ea580c")}
    </div>
  </section>
</div>`;
}

// ═══ TRAINING ═══
function Train({qs,players,addH}){
const[ph,setPh]=useState("setup");
const[pl,setPl]=useState("");
const[cats,setCats]=useState([...CATS]);
const[srcF,setSrcF]=useState("All");
const SRCS=["All","Core","24 SAEA","25 SAEA","26 SAEA"];
const qv=srcF==="All"?qs:(srcF==="Core"?qs.filter(q=>!q.src):qs.filter(q=>q.src===srcF));
const[dk,setDk]=useState([]);const[ix,setIx]=useState(0);
const[sc,setSc]=useState(0);const[res,setRes]=useState([]);
const[sa,setSa]=useState(false);const[ans,setAns]=useState(false);
const[tm,setTm]=useState(15);const[ta,setTa]=useState(false);
const ref=useRef();
const go=()=>{if(!pl)return;const p=qv.filter(q=>cats.includes(q.cat)),s=[...p].sort(()=>Math.random()-.5).slice(0,20);if(!s.length)return;setDk(s);setIx(0);setSc(0);setRes([]);setSa(false);setAns(false);setTm(15);setTa(true);setPh("play");};
useEffect(()=>{if(ph==="play"&&ta&&tm>0)ref.current=setTimeout(()=>setTm(t=>t-1),1e3);else if(ph==="play"&&ta&&tm===0){setTa(false);setSa(true);}return()=>clearTimeout(ref.current);},[tm,ta,ph]);
const buzz=()=>{setTa(false);setSa(true)};
const yes=()=>{if(ans)return;const q=dk[ix];setSc(s=>s+q.pts);setRes(p=>[...p,{c:true}]);addH({player:pl,qid:q.id,q:q.q,cat:q.cat,topic:getTopic(q),pts:q.pts,correct:true,mode:"train"});setAns(true)};
const no=()=>{if(ans)return;addH({player:pl,qid:dk[ix].id,q:dk[ix].q,cat:dk[ix].cat,topic:getTopic(dk[ix]),pts:0,correct:false,mode:"train"});setRes(p=>[...p,{c:false}]);setAns(true)};
const nx=()=>{if(!ans){addH({player:pl,qid:dk[ix].id,q:dk[ix].q,cat:dk[ix].cat,topic:getTopic(dk[ix]),pts:0,correct:false,mode:"train"});setRes(p=>[...p,{c:false}]);}if(ix+1>=dk.length){setPh("done");return;}setIx(i=>i+1);setSa(false);setAns(false);setTm(15);setTa(true)};

if(ph==="setup")return html`<div class="fu">
<h2 class="m" style=${{fontSize:18,fontWeight:800,marginBottom:6}}>⚡ Training Quiz</h2>
<p style=${{fontSize:16,color:"#64748b",marginBottom:16}}>${qs.length?'Drill daily! Pick your name and go.':'Questions coming soon!'}</p>
${qs.length>0&&html`<div>
<label class="m" style=${{fontSize:18,fontWeight:700,color:"#2563eb",display:"block",marginBottom:6}}>WHO ARE YOU?</label>
<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6,marginBottom:16}}>
${players.map(p=>html`<button onClick=${()=>setPl(p)} style=${{padding:13,borderRadius:8,fontSize:16,fontWeight:pl===p?700:500,background:pl===p?"#2563eb":"#ffffff",border:"2px solid "+(pl===p?"#2563eb":"#e2e8f0"),color:pl===p?"#ffffff":"#1a202c"}}>${p}</button>`)}</div>
<div style=${{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
${SRCS.map(sname=>{const n=sname==="All"?qs.length:(sname==="Core"?qs.filter(q=>!q.src).length:qs.filter(q=>q.src===sname).length);return html`<button onClick=${()=>setSrcF(sname)} style=${{padding:"7px 12px",borderRadius:12,fontSize:15,fontWeight:700,background:srcF===sname?"#2563eb":"#ffffff",color:srcF===sname?"#ffffff":"#64748b",border:"1px solid "+(srcF===sname?"#2563eb":"#e2e8f0")}}>${sname} (${n})</button>`;})}
</div>
<div style=${{display:"flex",flexWrap:"wrap",gap:5,marginBottom:14}}>
${CATS.map(c=>html`<button onClick=${()=>setCats(p=>p.includes(c)?p.filter(x=>x!==c):[...p,c])} style=${{padding:"8px 10px",borderRadius:12,fontSize:16,fontWeight:700,background:cats.includes(c)?CC[c]+"20":"#ffffff",color:cats.includes(c)?CC[c]:"#64748b",border:"1px solid "+(cats.includes(c)?CC[c]+"44":"#e2e8f0")}}>${c} (${qv.filter(q=>q.cat===c).length})</button>`)}</div>
<button onClick=${go} disabled=${!pl} style=${{background:pl?"#2563eb":"#e2e8f0",color:pl?"#060a12":"#64748b",padding:"12px 32px",borderRadius:8,fontSize:17,fontWeight:700}}>${pl?"Start as "+pl:"Select name"}</button>
</div>`}</div>`;

if(ph==="done"){const c=res.filter(r=>r.c).length,t=res.length,p=t?Math.round(c/t*100):0;
return html`<div class="fu" style=${{textAlign:"center",maxWidth:440,margin:"0 auto"}}>
<div style=${{fontSize:52}}>${p>=80?"🔥":p>=50?"💪":"📚"}</div>
<h2 class="m" style=${{fontSize:20,fontWeight:800,color:"#2563eb"}}>Done!</h2><p>${pl}</p>
<div style=${{display:"flex",justifyContent:"center",gap:20,margin:"12px 0 20px"}}>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#2563eb"}}>${sc}</div><div style=${{fontSize:16,color:"#64748b"}}>pts</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:"#10b981"}}>${c}/${t}</div><div style=${{fontSize:16,color:"#64748b"}}>correct</div></div>
<div><div class="m" style=${{fontSize:28,fontWeight:800,color:p>=80?"#10b981":p>=50?"#2563eb":"#ef4444"}}>${p}%</div><div style=${{fontSize:16,color:"#64748b"}}>acc</div></div>
</div>
<button onClick=${()=>setPh("setup")} style=${{background:"#2563eb",color:"#ffffff",padding:"11px 28px",borderRadius:8,fontWeight:700}}>Again</button>
</div>`;}

const cur=dk[ix];
return html`<div class="fu">
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:8}}>
<span class="m" style=${{fontSize:18,color:"#64748b"}}>Q ${ix+1}/${dk.length} · ${pl}</span>
<span class="m" style=${{fontSize:17,fontWeight:700,color:"#2563eb"}}>${sc} pts</span></div>
<div style=${{display:"flex",gap:10,alignItems:"center",marginBottom:12}}>
<div style=${{flex:1,height:3,background:"#bfdbfe",borderRadius:2}}><div style=${{width:(tm/15*100)+"%",height:"100%",background:tm<=5?"#ef4444":"#2563eb",borderRadius:2,transition:"width 1s linear"}}/></div>
<span class="m" style=${{fontSize:16,fontWeight:700,color:tm<=5?"#ef4444":"#2563eb"}}>${tm}s</span></div>
<div style=${{background:"#eff6ff",borderRadius:14,padding:24,border:"1px solid #93c5fd",marginBottom:16}}>
<div style=${{display:"flex",gap:6,marginBottom:14}}>
<span style=${{background:CC[cur.cat]+"20",color:CC[cur.cat],padding:"3px 10px",borderRadius:16,fontSize:17,fontWeight:700}}>${cur.cat}</span>
<span style=${{background:"#2563eb20",color:"#2563eb",padding:"3px 8px",borderRadius:16,fontSize:17,fontWeight:700}}>${cur.pts} pts</span>
${isNewQ(cur.id)&&newBadge()}${cur.src&&srcBadge(cur.src)}</div>
<p style=${{fontSize:17,lineHeight:1.55,fontWeight:700,marginBottom:16}}>${cur.q}</p>
${qImg(cur)}
${cur.type==="mc"&&cur.options&&!sa&&html`<div style=${{display:"grid",gap:6,marginBottom:14}}>
${cur.options.map((o,i)=>html`<div style=${{padding:"10px 14px",borderRadius:8,fontSize:16,background:"#bfdbfe",border:"1px solid #cbd5e1",color:"#1a202c"}}>${["A","B","C","D"][i]}. ${o}</div>`)}</div>`}
${!sa&&html`<button onClick=${buzz} style=${{background:"linear-gradient(135deg,#ef4444,#b91c1c)",color:"white",padding:"14px 36px",borderRadius:12,fontSize:17,fontWeight:800,display:"block",margin:"0 auto"}}>🔔 REVEAL</button>`}
${sa&&html`<div class="fr" style=${{background:"#10b98118",border:"2px solid #10b981",borderRadius:10,padding:16}}>
<p class="m" style=${{fontSize:16,fontWeight:700,color:"#10b981",marginBottom:6}}>ANSWER</p>
<p style=${{fontSize:20,fontWeight:800,color:"#1e293b"}}>${ansText(cur)}</p></div>`}
</div>
${sa&&!ans&&html`<div class="fu" style=${{marginBottom:14}}>
<p class="m" style=${{fontSize:18,fontWeight:700,color:"#64748b",marginBottom:8}}>DID YOU KNOW IT?</p>
<div style=${{display:"flex",gap:10}}>
<button onClick=${no} style=${{flex:1,padding:13,borderRadius:10,fontSize:18,fontWeight:700,background:"#ef444418",color:"#ef4444",border:"1px solid #ef444433"}}>✗ Nope</button>
<button onClick=${yes} style=${{flex:1,padding:13,borderRadius:10,fontSize:18,fontWeight:700,background:"#10b98118",color:"#10b981",border:"1px solid #10b98133"}}>✓ Got It!</button>
</div></div>`}

// ═══ FLASHCARDS ═══
function Flash({qs,prog,setProg}){

useEffect(()=>{if(ph==="play"&&tm>0)ref.current=setTimeout(()=>setTm(t=>t-1),1e3);else if(ph==="play"&&tm===0)submit();return()=>clearTimeout(ref.current)},[tm,ph,ix]);

setAnswers(p=>[...p,{i:ix,ua,ok,pts:q.pts,cat:q.cat,topic:getTopic(q)}]);addH({player:pl,qid:q.id,q:q.q,cat:q.cat,topic:getTopic(q),pts:ok?q.pts:0,correct:ok,mode:"assess"});

<div style=${{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style=${{fontSize:18,fontWeight:700}}>${a.name}</span>${nNew>0&&html`<span style=${{background:"#fef3c7",color:"#92400e",padding:"3px 8px",borderRadius:16,fontSize:14,fontWeight:800}}>✨ ${nNew} new</span>`}</div>

</div>`;

if(ph==="done"){const c=answers.filter(a=>a.ok).length,t=answers.length,p=t?Math.round(c/t*100):0,pts=answers.filter(a=>a.ok).reduce((s,a)=>s+a.pts,0);
const byCat={};answers.forEach(a=>{if(!byCat[a.cat])byCat[a.cat]={c:0,t:0};byCat[a.cat].t++;if(a.ok)byCat[a.cat].c++});
const byTopic={};answers.forEach(a=>{const topic=a.topic||a.cat;if(!byTopic[topic])byTopic[topic]={c:0,t:0,cat:a.cat};byTopic[topic].t++;if(a.ok)byTopic[topic].c++});
const weakest=Object.entries(byTopic).filter(([_,s])=>s.t>=2).sort((a,b)=>pct(a[1].c,a[1].t)-pct(b[1].c,b[1].t)).slice(0,3);
return html`<div class="fu" style=${{maxWidth:500,margin:"0 auto"}}>

// ═══ COACH DASHBOARD ═══
function CoachDash({players,hist,trainQs,assessQs,named}){
const[windowDays,setWindowDays]=useState(14);
const cutoff=Date.now()-windowDays*864e5;
const recent=hist.filter(h=>(h.ts||0)>=cutoff);
const allQs=[...trainQs,...assessQs];
const questionTopic=qid=>{const q=allQs.find(x=>x.id===qid);return q?getTopic(q):null};
const evTopic=h=>h.topic||questionTopic(h.qid)||h.cat||"Uncategorized";
const statRows=(items,keyFn)=>{
  const m={};items.forEach(h=>{const k=keyFn(h);if(!m[k])m[k]={label:k,cat:h.cat||"",c:0,t:0,pts:0,last:0};m[k].t++;if(h.correct)m[k].c++;m[k].pts+=h.pts||0;m[k].last=Math.max(m[k].last,h.ts||0);});
  return Object.values(m).map(s=>({...s,acc:pct(s.c,s.t)}));
};
const topicRows=statRows(recent,evTopic).filter(r=>r.t>=3).sort((a,b)=>a.acc-b.acc||b.t-a.t);
const catRows=statRows(recent,h=>h.cat||"Uncategorized").sort((a,b)=>a.acc-b.acc||b.t-a.t);
const playerRows=players.map(name=>{
  const e=hist.filter(h=>h.player===name),r=e.filter(h=>(h.ts||0)>=cutoff),c=r.filter(h=>h.correct),days=[...new Set(r.map(h=>dayKey(h.ts)))].length;
  const weekCut=Date.now()-7*864e5,week=[...new Set(e.filter(h=>(h.ts||0)>=weekCut).map(h=>dayKey(h.ts)))].length;
  const last=e.reduce((m,h)=>Math.max(m,h.ts||0),0);
  const topics=statRows(r,evTopic).filter(x=>x.t>=2).sort((a,b)=>a.acc-b.acc||b.t-a.t);
  return {name,total:r.length,correct:c.length,acc:pct(c.length,r.length),pts:c.reduce((s,h)=>s+(h.pts||0),0),activeDays:days,week,last,weak:topics[0]?.label||"—",weakAcc:topics[0]?.acc??null};
}).sort((a,b)=>b.week-a.week||b.total-a.total);
const teach=topicRows.filter(r=>r.acc<60&&r.t>=4).slice(0,6);
const drill=topicRows.filter(r=>r.acc>=60&&r.acc<75&&r.t>=4).slice(0,6);
const inactive=playerRows.filter(p=>!p.last||daysSince(p.last)>=7);
const sessionMatch=topic=>{
  const t=topic.toLowerCase();
  const found=named.find(s=>s.name.toLowerCase().includes(t.split(" ")[0])||s.questions?.some(q=>getTopic(q)===topic));
  return found?found.name:"Use category drill or build a 10-question set";
};
const badge=(text,bg,color)=>html`<span style=${{background:bg,color,padding:"3px 8px",borderRadius:999,fontSize:15,fontWeight:800,whiteSpace:"nowrap"}}>${text}</span>`;

return html`<div class="fu">

  <div><h2 class="m" style=${{fontSize:19,fontWeight:900,marginBottom:4}}>📊 Coach Dashboard</h2>

    <option value="7">Last 7 days</option><option value="14">Last 14 days</option><option value="30">Last 30 days</option><option value="3650">All time</option>

  <div style=${{background:"#ffffff",border:"1px solid #bfdbfe",borderRadius:12,padding:14}}><div class="m" style=${{fontSize:28,fontWeight:900,color:"#10b981"}}>${pct(recent.filter(h=>h.correct).length,recent.length)}%</div><div style=${{color:"#64748b",fontSize:16}}>team accuracy</div></div>
  <div style=${{background:"#ffffff",border:"1px solid #bfdbfe",borderRadius:12,padding:14}}><div class="m" style=${{fontSize:28,fontWeight:900,color:"#f97316"}}>${playerRows.filter(p=>p.week>0).length}/${players.length}</div><div style=${{color:"#64748b",fontSize:16}}>active this week</div></div>
  <div style=${{background:"#ffffff",border:"1px solid #bfdbfe",borderRadius:12,padding:14}}><div class="m" style=${{fontSize:28,fontWeight:900,color:"#ef4444"}}>${teach.length}</div><div style=${{color:"#64748b",fontSize:16}}>topics to teach</div></div>
</div>

  </section>

<h3 class="m" style=${{fontSize:17,fontWeight:900,color:"#334155",marginBottom:10}}>PRACTICE FREQUENCY</h3>
<table style=${{width:"100%",borderCollapse:"collapse",fontSize:16,minWidth:720}}>
<thead><tr style=${{textAlign:"left",color:"#64748b"}}><th style=${{padding:8}}>Player</th><th>Total active days</th><th>Practice days this week</th><th>Questions</th><th>Accuracy</th><th>Weakest topic</th><th>Last practice</th></tr></thead>
<tbody>${playerRows.map(p=>html`<tr style=${{borderTop:"1px solid #e2e8f0"}}>
<td style=${{padding:8,fontWeight:800}}>${p.name}</td><td>${p.activeDays}</td><td>${p.week}</td><td>${p.total}</td><td>${p.total?p.acc+"%":"—"}</td><td>${p.weak}${p.weakAcc!==null?" ("+p.weakAcc+"%)":""}</td><td>${p.last?shortDate(p.last):"Never"}</td>
</tr>`)}</tbody></table>
${inactive.length>0&&html`<div style=${{marginTop:10,background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:10,color:"#991b1b",fontSize:16}}><b>Check-in list:</b> ${inactive.map(p=>p.name).join(", ")}</div>`}
</section>

<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14}}>
<section style=${{background:"#ffffff",border:"1px solid #cbd5e1",borderRadius:12,padding:14}}>
<h3 class="m" style=${{fontSize:17,fontWeight:900,color:"#334155",marginBottom:10}}>CATEGORY HEALTH</h3>
${catRows.length?catRows.map(r=>html`<div style=${{marginBottom:10}}><div style=${{display:"flex",justifyContent:"space-between",fontSize:16}}><b style=${{color:CC[r.label]||"#334155"}}>${r.label}</b><span>${r.c}/${r.t} · ${r.acc}%</span></div><div style=${{height:8,background:"#e2e8f0",borderRadius:4,marginTop:4}}><div style=${{height:"100%",width:r.acc+"%",background:r.acc>=75?"#10b981":r.acc>=60?"#2563eb":"#ef4444",borderRadius:4}}/></div></div>`):html`<p style=${{fontSize:16,color:"#64748b"}}>No practice data yet.</p>`}
</section>
<section style=${{background:"#ffffff",border:"1px solid #cbd5e1",borderRadius:12,padding:14}}>
<h3 class="m" style=${{fontSize:17,fontWeight:900,color:"#334155",marginBottom:10}}>MOST MISSED TOPICS</h3>
${topicRows.length?topicRows.slice(0,10).map(r=>html`<div style=${{display:"flex",justifyContent:"space-between",gap:8,borderBottom:"1px solid #e2e8f0",padding:"8px 0",fontSize:16}}><span>${r.label}</span><b style=${{color:r.acc>=75?"#059669":r.acc>=60?"#2563eb":"#dc2626"}}>${r.acc}%</b></div>`):html`<p style=${{fontSize:16,color:"#64748b"}}>Topic rows appear after questions start logging with topic tags.</p>`}
</section>
</div>
</div>`;
}

// ═══ BUILDER (coach) ═══
function Build({addT,tQs,setT,aQs,setA,addAQ,named,setN}){
const[bk,setBk]=useState("training");
const[fm,setFm]=useState({cat:CATS[0],topic:"",pts:10,type:"buzzer",q:"",a:"",options:["","","",""]});
const curQs=bk==="assessment"?aQs:tQs,curSet=bk==="assessment"?setA:setT,curAdd=bk==="assessment"?addAQ:addT;
const sub=()=>{if(!fm.q.trim()||!fm.a.trim())return;const q={cat:fm.cat,topic:fm.topic.trim()||undefined,pts:fm.pts,type:fm.type,q:fm.q.trim(),a:fm.a.trim()};if(fm.type==="mc")q.options=fm.options.filter(o=>o.trim());curAdd(q);setFm(p=>({...p,q:"",a:"",options:["","","",""]}))};

return html`<div class="fu">
<h2 class="m" style=${{fontSize:18,fontWeight:800,marginBottom:12}}>✏️ Builder</h2>
<div style=${{display:"flex",gap:6,marginBottom:14}}>
<button onClick=${()=>setBk("training")} style=${{padding:"8px 16px",borderRadius:8,fontSize:16,fontWeight:700,background:bk==="training"?"#2563eb22":"#ffffff",border:"2px solid "+(bk==="training"?"#2563eb":"#e2e8f0"),color:bk==="training"?"#2563eb":"#64748b"}}>Training (${tQs.length})</button>
<button onClick=${()=>setBk("assessment")} style=${{padding:"8px 16px",borderRadius:8,fontSize:16,fontWeight:700,background:bk==="assessment"?"#ef444422":"#ffffff",border:"2px solid "+(bk==="assessment"?"#ef4444":"#e2e8f0"),color:bk==="assessment"?"#ef4444":"#64748b"}}>Assessment (${aQs.length})</button></div>
<div style=${{maxWidth:540}}>
<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
<select value=${fm.cat} onChange=${e=>setFm(p=>({...p,cat:e.target.value}))} class="inp" style=${{fontSize:18,padding:10}}>${CATS.map(c=>html`<option key=${c}>${c}</option>`)}</select>
<select value=${fm.pts} onChange=${e=>setFm(p=>({...p,pts:+e.target.value}))} class="inp" style=${{fontSize:18,padding:10}}>${[5,10,15,20,25].map(v=>html`<option key=${v} value=${v}>${v}pts</option>`)}</select>
<select value=${fm.type} onChange=${e=>setFm(p=>({...p,type:e.target.value}))} class="inp" style=${{fontSize:18,padding:10}}><option value="buzzer">Buzzer</option><option value="mc">MC</option><option value="fill">Fill</option></select></div>
<input value=${fm.topic} onInput=${e=>setFm(p=>({...p,topic:e.target.value}))} placeholder="Topic tag, optional — e.g., Elasticity, GDP, Cost curves" class="inp" style=${{marginBottom:8,fontSize:16,padding:10}}/>
<textarea value=${fm.q} onInput=${e=>setFm(p=>({...p,q:e.target.value}))} placeholder="Question..." rows=${3} class="inp" style=${{marginBottom:8,resize:"vertical"}}/>
${fm.type==="mc"&&html`<div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
${["A","B","C","D"].map((l,i)=>html`<input value=${fm.options[i]} onInput=${e=>{const o=[...fm.options];o[i]=e.target.value;setFm(p=>({...p,options:o}))}} placeholder=${"Option "+l} class="inp" style=${{fontSize:18,padding:10}}/>`)}</div>`}
<input value=${fm.a} onInput=${e=>setFm(p=>({...p,a:e.target.value}))} placeholder=${fm.type==="mc"?"Correct letter":"Answer"} onKeyDown=${e=>e.key==="Enter"&&sub()} class="inp" style=${{marginBottom:10}}/>
<button onClick=${sub} style=${{background:"#2563eb",color:"#ffffff",padding:"10px 24px",borderRadius:8,fontWeight:700}}>Add Question</button></div>
<div style=${{marginTop:20,maxHeight:400,overflowY:"auto"}}>${curQs.map((q,i)=>html`<div key=${q.id||i} style=${{background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:8,padding:12,marginBottom:5,display:"flex",gap:8}}>
<div style=${{flex:1}}><span style=${{fontSize:16,color:CC[q.cat],fontWeight:700}}>${q.cat} · ${getTopic(q)} · ${q.pts}pts</span><p style=${{fontSize:18,margin:"2px 0"}}>${q.q}</p><p style=${{fontSize:17,color:"#10b981"}}>${q.a}</p></div>
<button onClick=${()=>curSet(p=>p.filter((_,j)=>j!==i))} style=${{fontSize:17,color:"#ef4444",background:"#ef444415",padding:"4px 10px",borderRadius:6,alignSelf:"start",border:"1px solid #ef444433"}}>Del</button></div>`)}</div>
</div>`;
}

// ═══ TEAM ═══
function Team({players,setPlayers,hist}){
const[ed,setEd]=useState(null);const[ev,setEv]=useState("");const[nn,setNn]=useState("");
const days=Math.ceil((new Date("2026-07-31")-new Date())/864e5);
const gs=n=>{const e=hist.filter(h=>h.player===n),c=e.filter(h=>h.correct),pts=c.reduce((s,h)=>s+(h.pts||0),0),acc=pct(c.length,e.length),daySet=[...new Set(e.map(h=>dayKey(h.ts)))],week=[...new Set(e.filter(h=>(h.ts||0)>=Date.now()-7*864e5).map(h=>dayKey(h.ts)))].length,last=e.reduce((m,h)=>Math.max(m,h.ts||0),0);
let ses=0;if(e.length){ses=1;const sr=[...e].sort((a,b)=>(a.ts||0)-(b.ts||0));for(let i=1;i<sr.length;i++)if((sr[i].ts||0)-(sr[i-1].ts||0)>12e4)ses++}return{total:e.length,correct:c.length,pts,acc,ses,activeDays:daySet.length,week,last}};
const rows=players.map(p=>({name:p,...gs(p)}));
const reps=rows.filter(p=>p.total>0).sort((a,b)=>b.week-a.week||b.activeDays-a.activeDays||b.total-a.total);
const mastery=rows.filter(p=>p.total>=5).sort((a,b)=>b.acc-a.acc||b.total-a.total);
const card=(p,i,kind)=>html`<div class="fu" style=${{background:i===0?"#2563eb18":"#ffffff",border:"2px solid "+(i===0?"#2563eb":"#cbd5e1"),borderRadius:10,padding:"14px 18px",marginBottom:8}}>
<div style=${{display:"flex",justifyContent:"space-between",marginBottom:6}}>
<div style=${{display:"flex",gap:10,alignItems:"center"}}><span style=${{fontSize:20}}>${["🥇","🥈","🥉"][i]||"#"+(i+1)}</span><span style=${{fontWeight:800,fontSize:18,color:"#000000"}}>${p.name}</span></div>
<span class="m" style=${{fontSize:24,fontWeight:800,color:i===0?"#2563eb":"#1a202c"}}>${kind==="reps"?p.week+" days":p.acc+"%"}</span></div>
<div style=${{display:"flex",gap:16,paddingLeft:38,flexWrap:"wrap"}}>
<span><span class="m" style=${{fontSize:17,color:"#f97316",fontWeight:700}}>${p.week}</span> <span style=${{fontSize:15,color:"#4b5563",fontWeight:700}}>practice days this week</span></span>
<span><span class="m" style=${{fontSize:17,color:"#0284c7",fontWeight:700}}>${p.total}</span> <span style=${{fontSize:15,color:"#4b5563",fontWeight:700}}>questions</span></span>
<span><span class="m" style=${{fontSize:17,color:p.acc>=80?"#059669":p.acc>=50?"#2563eb":"#dc2626",fontWeight:700}}>${p.acc}%</span> <span style=${{fontSize:15,color:"#4b5563",fontWeight:700}}>accuracy</span></span>
<span><span class="m" style=${{fontSize:17,color:"#64748b",fontWeight:700}}>${p.activeDays}</span> <span style=${{fontSize:15,color:"#4b5563",fontWeight:700}}>total active days</span></span>
<span style=${{fontSize:15,color:"#64748b"}}>last: ${p.last?shortDate(p.last):"never"}</span>
</div></div>`;

return html`<div class="fu">
<div style=${{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
<h2 class="m" style=${{fontSize:18,fontWeight:800}}>👥 Team</h2>
<div style=${{background:"#2563eb10",border:"1px solid #2563eb33",borderRadius:10,padding:"10px 16px",textAlign:"center"}}>
<div class="m" style=${{fontSize:24,fontWeight:800,color:"#2563eb"}}>${days}</div><div style=${{fontSize:16,color:"#64748b"}}>days to go</div></div></div>

${reps.length>0&&html`<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:14,marginBottom:24}}>
<div><h3 class="m" style=${{fontSize:17,fontWeight:800,color:"#2563eb",marginBottom:4}}>MOST CONSISTENT PRACTICE</h3>
<p style=${{fontSize:15,color:"#64748b",marginBottom:12}}>Ranked by practice days this week, then total active days, then questions answered.</p>
${reps.map((p,i)=>card(p,i,"reps"))}</div>
<div><h3 class="m" style=${{fontSize:17,fontWeight:800,color:"#10b981",marginBottom:4}}>HIGHEST ACCURACY</h3>
<p style=${{fontSize:15,color:"#64748b",marginBottom:12}}>Players appear after 5+ questions. Ties break by questions answered.</p>
${mastery.length?mastery.map((p,i)=>card(p,i,"mastery")):html`<p style=${{fontSize:16,color:"#64748b"}}>Need at least 5 questions per player.</p>`}</div>
</div>`}

<h3 class="m" style=${{fontSize:17,fontWeight:700,color:"#64748b",marginBottom:10}}>PLAYERS</h3>
<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8,marginBottom:16}}>
${players.map((p,i)=>html`<div style=${{background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:10,padding:14}}>
${ed===i?html`<div style=${{display:"flex",gap:6}}>
<input value=${ev} onInput=${e=>setEv(e.target.value)} onKeyDown=${e=>{if(e.key==="Enter"&&ev.trim()){setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null)}}} class="inp" style=${{fontSize:15}}/>
<button onClick=${()=>{if(ev.trim())setPlayers(pr=>pr.map((x,j)=>j===i?ev.trim():x));setEd(null)}} style=${{background:"#10b981",color:"#060a12",padding:"10px 16px",borderRadius:8,fontWeight:700}}>Save</button></div>`
:html`<div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style=${{fontSize:16,fontWeight:700}}>${p}</span>
<div style=${{display:"flex",gap:6}}>
<button onClick=${()=>{setEd(i);setEv(p)}} style=${{fontSize:18,color:"#2563eb",background:"#2563eb15",padding:"8px 12px",borderRadius:6,fontWeight:700,border:"1px solid #2563eb33"}}>Edit</button>
${players.length>1&&html`<button onClick=${()=>setPlayers(pr=>pr.filter((_,j)=>j!==i))} style=${{fontSize:18,color:"#ef4444",background:"#ef444415",padding:"8px 10px",borderRadius:6,border:"1px solid #ef444433"}}>×</button>`}
</div></div>`}</div>`)}</div>
${players.length<12&&html`<div style=${{display:"flex",gap:6}}>
<input value=${nn} onInput=${e=>setNn(e.target.value)} placeholder="Add player..." onKeyDown=${e=>{if(e.key==="Enter"&&nn.trim()){setPlayers(p=>[...p,nn.trim()]);setNn("")}}} class="inp" style=${{maxWidth:240}}/>
<button onClick=${()=>{if(nn.trim()){setPlayers(p=>[...p,nn.trim()]);setNn("")}}} style=${{background:"#2563eb",color:"#ffffff",padding:"8px 16px",borderRadius:6,fontWeight:700}}>Add</button></div>`}
</div>`;
}

ReactDOM.render(html`<${App}/>`,document.getElementById("root"));
</script>
</body>
</html>
